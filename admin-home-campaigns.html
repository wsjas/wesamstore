<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مركز الصفحة الرئيسية والعروض</title>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="firebase-config.js"></script><script src="admin-safe-loader.js"></script>
<style>:root{--bg:#f6f8fc;--card:#fff;--text:#142033;--muted:#64748b;--line:#e5e7eb;--orange:#f97316;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--dark:#111827;--shadow:0 18px 44px rgba(15,23,42,.08);--r:20px}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#fff7ed 0,#f6f8fc 40%,#eef6ff 100%);color:var(--text)}a{text-decoration:none;color:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{width:min(1240px,calc(100% - 28px));margin:auto;padding:18px 0 34px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0 16px;flex-wrap:wrap}.top h1{margin:0;font-size:25px}.muted{color:var(--muted)}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;color:#111827;font-weight:800;display:inline-flex;gap:7px;align-items:center;justify-content:center}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:#475569;font-weight:900}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;width:100%;min-width:0}.field textarea{min-height:86px;resize:vertical}.full{grid-column:1/-1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top}th{background:#f8fafc;font-size:13px;color:#475569}td{font-size:13px}.mini{padding:7px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:800}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;margin-bottom:14px;line-height:1.7}.notice.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.notice.err{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:27px;margin-top:5px}.toast{position:fixed;left:16px;bottom:16px;z-index:99;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;display:none;max-width:min(520px,calc(100vw - 32px));line-height:1.6}.toast.show{display:block}.ltr{direction:ltr;text-align:left}.printbox{display:none}@media(max-width:900px){.two,.three,.four,.form{grid-template-columns:1fr}.wrap{width:min(100% - 18px,1240px)}.top h1{font-size:21px}}@media print{.top,.toolbar,.btn,.mini,.notice,.no-print{display:none!important}body{background:#fff}.card,.table-wrap{box-shadow:none;border:0}.printbox{display:block}}</style></head><body><div class="wrap"><div class="top"><div><h1>مركز الصفحة الرئيسية والعروض</h1><div class="muted">وسام للإلكترونيات — متصل بمشروع Firebase الصحيح</div></div><div class="actions"><a class="btn ghost" href="admin.html">لوحة التحكم</a><button class="btn blue" onclick="location.reload()">تحديث</button><a class="btn primary" href="index.html" target="_blank">فتح الموقع</a></div></div><div id="status" class="notice">جار تحميل Firebase...</div>
<div class="notice ok">هذه الصفحة تضيف أقسامًا وعروضًا للصفحة الرئيسية. العناصر النشطة تظهر في الموقع عبر ملف <b>wesam-home-dynamic.js</b>.</div>
<div class="grid two"><div class="card"><h3>إضافة / تعديل قسم</h3><form id="blockForm" class="form"><input type="hidden" name="id" id="editId"><div class="field"><label>مكان الظهور</label><select name="placement"><option value="hero">أعلى الصفحة</option><option value="offer">العروض</option><option value="service">الصيانة</option><option value="shop">المتجر</option></select></div><div class="field"><label>الحالة</label><select name="active"><option value="true">نشط</option><option value="false">مخفي</option></select></div><div class="field"><label>العنوان</label><input name="title" required></div><div class="field"><label>الترتيب</label><input name="sortOrder" type="number" value="1"></div><div class="field full"><label>الوصف</label><textarea name="subtitle"></textarea></div><div class="field full"><label>رابط الصورة</label><input name="image"></div><div class="field"><label>نص الزر</label><input name="buttonText" value="اطلب الآن"></div><div class="field"><label>رابط الزر</label><input name="buttonLink" value="request.html"></div><div class="field"><label>لون البطاقة</label><select name="tone"><option value="orange">برتقالي</option><option value="blue">أزرق</option><option value="green">أخضر</option><option value="dark">داكن</option></select></div><div class="field"><label>ملاحظة داخلية</label><input name="note"></div><div class="full actions"><button class="btn primary">حفظ في Firebase</button><button class="btn ghost" type="button" onclick="resetForm()">تفريغ</button><button class="btn green" type="button" onclick="seedDefaults()">إنشاء أقسام مقترحة</button></div></form></div><div class="card"><h3>معاينة</h3><div id="preview" style="border-radius:22px;padding:18px;color:#fff;background:linear-gradient(135deg,#f97316,#2563eb);min-height:210px;display:grid;align-content:center;gap:8px"></div></div></div><div class="card"><div class="toolbar"><input id="q" placeholder="بحث..." oninput="render()" style="padding:11px;border:1px solid #e5e7eb;border-radius:14px"><button class="btn blue" onclick="loadAll()">تحديث من Firebase</button></div><div id="list"></div></div>
</div><div id="toast" class="toast"></div><script>
function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(msg,ok=true){const t=$('toast');t.textContent=msg;t.style.background=ok?'#111827':'#991b1b';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3800)}
function num(v){return Number(v||0)}
function jod(v){return num(v).toFixed(2)+' د.أ'}
function dtext(v){try{const d=v&&v.toDate?v.toDate():(v?new Date(v):null);return d&&!isNaN(d)?d.toLocaleString('ar-JO'):'—'}catch(e){return '—'}}
function phoneClean(p){return String(p||'').replace(/\D/g,'').replace(/^0/,'962')}
function formData(form){const data=Object.fromEntries(new FormData(form).entries());Object.keys(data).forEach(k=>{if(data[k]==='true')data[k]=true;else if(data[k]==='false')data[k]=false;else if(['amount','points','total','sortOrder','stock','discount','paidAmount','expectedAmount'].includes(k))data[k]=Number(data[k]||0)});return data}
function table(headers, rows, empty='لا توجد بيانات'){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" style="text-align:center;color:#64748b;padding:22px">${empty}</td></tr>`}</tbody></table></div>`}
function setStatus(text, ok=true){$('status').className='notice '+(ok?'ok':'err');$('status').textContent=text}
window.addEventListener('error',e=>setStatus('خطأ في الصفحة: '+(e.message||e.error),false));
</script><script>
let blocks=[]; const WF=()=>window.WesamFirebase;
function preview(){const d=formData($('blockForm')); $('preview').innerHTML=`<small>${esc(d.placement||'')}</small><h2 style="margin:0;font-size:28px">${esc(d.title||'عنوان العرض')}</h2><p style="line-height:1.8">${esc(d.subtitle||'وصف العرض يظهر هنا')}</p><a style="background:#fff;color:#111827;border-radius:12px;padding:10px 14px;width:max-content;font-weight:900">${esc(d.buttonText||'اطلب الآن')}</a>`}
document.addEventListener('input',e=>{if(e.target.closest('#blockForm'))preview()});
async function loadAll(){try{if(!WF()||!WF().db) throw new Error('Firebase غير محمل'); blocks=await WF().getCollection('homepage_blocks',{limit:800}); blocks.sort((a,b)=>num(a.sortOrder)-num(b.sortOrder)); setStatus('تم تحميل '+blocks.length+' عنصر من homepage_blocks'); render(); preview()}catch(e){setStatus(e.message,false)}}
function render(){const q=($('q')?.value||'').trim(); const rows=blocks.filter(b=>!q||JSON.stringify(b).includes(q)).map(b=>`<tr><td>${b.active!==false?'<span class="badge green">نشط</span>':'<span class="badge red">مخفي</span>'}</td><td><b>${esc(b.title)}</b><br><span class="muted">${esc(b.subtitle||'')}</span></td><td>${esc(b.placement||'')}</td><td>${esc(b.sortOrder||0)}</td><td>${esc(b.buttonText||'')}</td><td><button class="mini blue" onclick="editBlock('${b.id}')">تعديل</button> <button class="mini red" onclick="delBlock('${b.id}')">حذف</button></td></tr>`); $('list').innerHTML=table(['الحالة','العنوان','المكان','الترتيب','الزر','إجراءات'],rows)}
$('blockForm').onsubmit=async e=>{e.preventDefault();try{const data=formData(e.target); const id=data.id; delete data.id; if(id) await WF().setDoc('homepage_blocks',id,data,true); else await WF().addDoc('homepage_blocks',data); resetForm(); await loadAll(); toast('تم الحفظ')}catch(err){toast(err.message,false)}}
function editBlock(id){const b=blocks.find(x=>x.id===id); if(!b)return; const f=$('blockForm'); Object.keys(b).forEach(k=>{if(f.elements[k]) f.elements[k].value=b[k]}); $('editId').value=id; preview(); scrollTo({top:0,behavior:'smooth'})}
async function delBlock(id){if(!confirm('حذف هذا القسم؟'))return; try{await WF().deleteDoc('homepage_blocks',id); await loadAll(); toast('تم الحذف')}catch(e){toast(e.message,false)}}
function resetForm(){$('blockForm').reset();$('editId').value='';preview()}
async function seedDefaults(){const defaults=[{placement:'hero',active:true,title:'صيانة شاشات LED باحتراف',subtitle:'طلب صيانة سريع ومتابعة حالة الطلب.',buttonText:'اطلب صيانة',buttonLink:'request.html',tone:'orange',sortOrder:1},{placement:'offer',active:true,title:'عروض دائمة على الصيانة',subtitle:'خصومات موسمية وخدمة فحص دقيقة.',buttonText:'شاهد العروض',buttonLink:'offers.html',tone:'blue',sortOrder:2},{placement:'shop',active:true,title:'متجر وسام للإلكترونيات',subtitle:'ريموتات، رسيفرات، وإكسسوارات.',buttonText:'افتح المتجر',buttonLink:'shop.html',tone:'green',sortOrder:3}]; for(const x of defaults) await WF().addDoc('homepage_blocks',x); await loadAll(); toast('تم إنشاء الأقسام المقترحة')}
setTimeout(loadAll,700);</script></body></html>
