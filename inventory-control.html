<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إدارة المخزون والموردين</title><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script><style>
:root{--blue:#1e3a8a;--orange:#f97316;--green:#15803d;--red:#b91c1c;--bg:#f4f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe3ef}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl}.wrap{max-width:1220px;margin:auto;padding:22px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px}.brand{display:flex;gap:12px;align-items:center}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--orange),var(--blue));color:#fff;display:grid;place-items:center;font-weight:900;font-size:24px;box-shadow:0 12px 30px rgba(30,58,138,.18)}h1{margin:0;font-size:24px}p{color:var(--muted);line-height:1.7}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}.two{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.stat span{display:block;color:var(--muted);font-size:13px}.stat b{font-size:28px;color:var(--blue)}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:14px 0}.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#e2e8f0;color:#0f172a}.primary{background:var(--orange);color:#fff}.blue{background:var(--blue);color:#fff}.green{background:var(--green);color:#fff}.red{background:var(--red);color:#fff}.ghost{background:#fff;border:1px solid var(--line)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;font-family:inherit}textarea{min-height:90px}.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.full{grid-column:1/-1}.field label{display:block;margin-bottom:6px;font-weight:800;color:#334155}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:12px;border-bottom:1px solid #eef2f7;text-align:right;vertical-align:top}th{background:#f8fafc;color:#334155}.muted{color:var(--muted);font-size:12px}.ok{color:var(--green);font-weight:800}.bad{color:var(--red);font-weight:800}.notice{border-radius:18px;padding:13px 15px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;margin:12px 0}.notice.okbox{background:#ecfdf5;border-color:#bbf7d0;color:#166534}.notice.errbox{background:#fef2f2;border-color:#fecaca;color:#991b1b}.ltr{direction:ltr;text-align:left}.small{font-size:12px}.pill{display:inline-flex;border-radius:999px;padding:5px 10px;background:#eff6ff;color:#1e3a8a;font-weight:800;font-size:12px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modal.show{display:flex}.modal-box{background:#fff;border-radius:24px;padding:18px;width:min(900px,96vw);max-height:90vh;overflow:auto}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.hide{display:none!important}.thumb{width:54px;height:54px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}@media print{.no-print,.top,.toolbar,.notice:not(.print-keep){display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.table-wrap{border:0}body{background:#fff}}@media(max-width:720px){.top{display:block}.wrap{padding:12px}table{min-width:760px}.form{grid-template-columns:1fr}.btn{width:100%}}
</style></head><body><div class="wrap"><div class="top no-print"><div class="brand"><div class="logo">و</div><div><h1>إدارة المخزون والموردين</h1><p>وسام للإلكترونيات - أدوات الإدارة المتقدمة</p></div></div><div class="toolbar"><a class="btn ghost" href="admin.html">لوحة التحكم</a><a class="btn ghost" href="index.html" target="_blank">الموقع</a><button class="btn blue" onclick="location.reload()">تحديث</button></div></div><div id="status" class="notice">جاري تحميل Firebase...</div>
<div class="grid cards"><div class="card stat"><span>عدد المنتجات</span><b id="pCount">0</b></div><div class="card stat"><span>منخفضة المخزون</span><b id="lowCount">0</b></div><div class="card stat"><span>حركات المخزون</span><b id="mCount">0</b></div><div class="card stat"><span>الموردون</span><b id="sCount">0</b></div></div>
<div class="toolbar no-print"><input id="search" placeholder="بحث عن منتج"><input id="threshold" type="number" value="2" style="max-width:120px" title="حد التنبيه"><button class="btn primary" id="btnMove">حركة مخزون</button><button class="btn green" id="btnSupplier">إضافة مورد</button><button class="btn blue" id="btnCSV">تصدير CSV</button></div>
<div id="content"></div>
</div><div id="modal" class="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">تفاصيل</h3><button class="btn red" onclick="closeModal()">إغلاق</button></div><div id="modalBody"></div></div></div><script>
const $ = id => document.getElementById(id);
const WF = () => window.WesamFirebase;
const JOD = v => (Number(v||0)).toFixed(2)+' د.أ';
const esc = s => String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const dateText = v => { try{ const d=v&&v.toDate?v.toDate():(v?new Date(v):null); return d&&!isNaN(d)?d.toLocaleString('ar-JO'):'—'; }catch(e){ return '—'; } };
const dateOnly = v => { try{ const d=v&&v.toDate?v.toDate():(v?new Date(v):new Date()); return d&&!isNaN(d)?d.toISOString().slice(0,10):''; }catch(e){ return ''; } };
const phoneKey = p => String(p||'').replace(/\D/g,'').replace(/^0/,'962');
function setStatus(msg, ok=true){ const el=$('status'); if(!el) return; el.className='notice '+(ok?'okbox':'errbox'); el.textContent=msg; }
function table(headers, rows, empty='لا توجد بيانات'){ return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}">${empty}</td></tr>`}</tbody></table></div>`; }
function openModal(t,h){ $('modalTitle').textContent=t; $('modalBody').innerHTML=h; $('modal').classList.add('show'); }
function closeModal(){ $('modal').classList.remove('show'); $('modalBody').innerHTML=''; }
function formData(form){ const d=Object.fromEntries(new FormData(form).entries()); Object.keys(d).forEach(k=>{ if(['amount','total','stock','quantity','price','sell','buyPrice','minStock','value'].includes(k)) d[k]=Number(d[k]||0); if(d[k]==='true') d[k]=true; if(d[k]==='false') d[k]=false; }); return d; }
function downloadText(name,text,type='text/plain;charset=utf-8'){ const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function toCSV(rows){ if(!rows.length) return '\ufeff'; const flat=rows.map(r=>{ const o={}; Object.keys(r).forEach(k=>{ const v=r[k]; o[k]=(v&&typeof v==='object')?JSON.stringify(v):v; }); return o; }); const keys=[...new Set(flat.flatMap(o=>Object.keys(o)))]; return '\ufeff'+[keys.join(','),...flat.map(o=>keys.map(k=>'"'+String(o[k]??'').replace(/"/g,'""')+'"').join(','))].join('\n'); }
window.addEventListener('error', e => setStatus('خطأ في الصفحة: '+(e.message||e.error), false));
function waitFirebase(){ return new Promise((resolve,reject)=>{ let tries=0; const t=setInterval(()=>{ tries++; if(WF() && WF().db){ clearInterval(t); setStatus('متصل مع Firebase: '+WF().projectId, true); resolve(WF()); } if(tries>30){ clearInterval(t); reject(new Error('لم يتم تحميل Firebase أو لا يوجد اتصال.')); } },250); }); }

let products=[],moves=[],suppliers=[];
async function load(){ products=await WF().getCollection('products',{limit:3000}); moves=await WF().getCollection('inventory_movements',{limit:3000}); suppliers=await WF().getCollection('suppliers',{limit:1000}); render(); }
function stock(p){return Number(p.stock??p.quantity??p.qty??0)} function minStock(p){return Number(p.minStock??$('threshold').value??2)}
function render(){ const q=$('search').value.toLowerCase(); const rows=products.filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q)); $('pCount').textContent=products.length; $('lowCount').textContent=products.filter(p=>stock(p)<=minStock(p)).length; $('mCount').textContent=moves.length; $('sCount').textContent=suppliers.length; $('content').innerHTML=`<div class="card"><h2>المخزون</h2>`+table(['المنتج','التصنيف','المخزون','حد التنبيه','البيع','الحالة','إجراءات'], rows.map(p=>`<tr><td><b>${esc(p.name||p.title)}</b><br><span class="muted">${esc(p.id)}</span></td><td>${esc(p.category||p.cat||'')}</td><td>${stock(p)<=minStock(p)?'<b class="bad">'+stock(p)+'</b>':'<b class="ok">'+stock(p)+'</b>'}</td><td>${minStock(p)}</td><td>${JOD(p.sell??p.price)}</td><td>${stock(p)<=0?'غير متوفر':stock(p)<=minStock(p)?'منخفض':'جيد'}</td><td><button class="btn ghost" onclick="moveForm('${p.id}')">حركة</button><button class="btn blue" onclick="setMin('${p.id}')">حد التنبيه</button></td></tr>`))+`</div><div class="card"><h2>آخر حركات المخزون</h2>`+table(['التاريخ','المنتج','النوع','الكمية','ملاحظة'], moves.slice(0,80).map(m=>`<tr><td>${dateText(m.createdAt||m.date)}</td><td>${esc(m.productName||m.productId)}</td><td>${esc(m.type)}</td><td>${Number(m.quantity||0)}</td><td>${esc(m.note||'')}</td></tr>`))+`</div>`; }
function moveForm(id=''){ const p=products.find(x=>x.id===id)||{}; openModal('حركة مخزون',`<form class="form" onsubmit="saveMove(event)"><div class="field"><label>المنتج</label><select name="productId" required>${products.map(x=>`<option value="${esc(x.id)}" ${x.id===id?'selected':''}>${esc(x.name||x.title||x.id)}</option>`).join('')}</select></div><div class="field"><label>النوع</label><select name="type"><option value="in">إدخال</option><option value="out">إخراج</option><option value="adjust">تعديل مباشر</option></select></div><div class="field"><label>الكمية</label><input name="quantity" type="number" required></div><div class="field"><label>المورد</label><select name="supplierId"><option value="">بدون</option>${suppliers.map(s=>`<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('')}</select></div><div class="field full"><label>ملاحظة</label><textarea name="note"></textarea></div><div class="full"><button class="btn primary">حفظ الحركة وتحديث المنتج</button></div></form>`); }
async function saveMove(e){ e.preventDefault(); const d=formData(e.target); const p=products.find(x=>x.id===d.productId); if(!p) throw new Error('المنتج غير موجود'); d.productName=p.name||p.title||p.id; const q=Number(d.quantity||0); let newStock=stock(p); if(d.type==='in') newStock += q; else if(d.type==='out') newStock -= q; else newStock = q; await WF().addDoc('inventory_movements',d); await WF().setDoc('products',p.id,{stock:newStock,quantity:newStock},true); await WF().addAuditLog('inventory_move',{collection:'products',docId:p.id,description:`حركة مخزون ${d.type} كمية ${q}`}); closeModal(); await load(); setStatus('تم حفظ حركة المخزون وتحديث المنتج.'); }
function setMin(id){ const p=products.find(x=>x.id===id)||{}; openModal('حد تنبيه المخزون',`<form class="form" onsubmit="saveMin(event,'${id}')"><div class="field"><label>المنتج</label><input value="${esc(p.name||p.title||id)}" disabled></div><div class="field"><label>حد التنبيه</label><input name="minStock" type="number" value="${minStock(p)}"></div><div class="full"><button class="btn primary">حفظ</button></div></form>`); }
async function saveMin(e,id){ e.preventDefault(); await WF().setDoc('products',id,formData(e.target),true); closeModal(); await load(); }
function supplierForm(){ openModal('إضافة مورد',`<form class="form" onsubmit="saveSupplier(event)"><div class="field"><label>اسم المورد</label><input name="name" required></div><div class="field"><label>الهاتف</label><input name="phone"></div><div class="field full"><label>ملاحظات</label><textarea name="notes"></textarea></div><div class="full"><button class="btn primary">حفظ</button></div></form>`); }
async function saveSupplier(e){ e.preventDefault(); await WF().addDoc('suppliers',formData(e.target)); closeModal(); await load(); }
waitFirebase().then(load).catch(e=>setStatus(e.message,false)); $('search').oninput=render; $('threshold').oninput=render; $('btnMove').onclick=()=>moveForm(); $('btnSupplier').onclick=supplierForm; $('btnCSV').onclick=()=>downloadText('inventory.csv',toCSV(products));
</script></body></html>
