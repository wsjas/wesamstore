<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات الصيانة - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="admin-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

const REPAIRS = [
  { id: 'WS-48201', customer: 'محمد العمري', initial: 'م', phone: '0790123456', service: 'صيانة شاشة LED', device: 'Samsung 55"', issue: 'لا يوجد صورة', status: 'progress', tech: 'يوسف', date: '2026-04-30', amount: 45 },
  { id: 'WS-48200', customer: 'سارة الحسن', initial: 'س', phone: '0795554321', service: 'صيانة ميكروويف', device: 'LG MS2540', issue: 'لا يسخّن', status: 'new', tech: '-', date: '2026-04-30', amount: 25 },
  { id: 'WS-48199', customer: 'خالد أبو زيد', initial: 'خ', phone: '0791234567', service: 'صيانة مكنسة', device: 'Bosch BGL35', issue: 'ضعف شفط', status: 'done', tech: 'كريم', date: '2026-04-29', amount: 18 },
  { id: 'WS-48198', customer: 'لينا قاسم', initial: 'ل', phone: '0792345678', service: 'برمجة ريموت', device: 'Samsung TV', issue: 'يحتاج برمجة', status: 'done', tech: 'يوسف', date: '2026-04-29', amount: 12 },
  { id: 'WS-48197', customer: 'يوسف الشريف', initial: 'ي', phone: '0793456789', service: 'صيانة رسيفر', device: 'HD Receiver', issue: 'لا يلتقط القنوات', status: 'progress', tech: 'كريم', date: '2026-04-29', amount: 32 },
  { id: 'WS-48196', customer: 'فاطمة العلي', initial: 'ف', phone: '0794567890', service: 'صيانة شاشة LED', device: 'LG 50"', issue: 'بقع على الشاشة', status: 'new', tech: '-', date: '2026-04-28', amount: 65 },
  { id: 'WS-48195', customer: 'عمر الزعبي', initial: 'ع', phone: '0795678901', service: 'صيانة ميكروويف', device: 'Samsung MG23', issue: 'لوحة التحكم', status: 'cancelled', tech: '-', date: '2026-04-28', amount: 0 },
  { id: 'WS-48194', customer: 'هند سلامة', initial: 'ه', phone: '0796789012', service: 'صيانة مكنسة', device: 'Philips FC8',  issue: 'لا تعمل', status: 'done', tech: 'كريم', date: '2026-04-28', amount: 22 },
  { id: 'WS-48193', customer: 'ربى المصري', initial: 'ر', phone: '0797890123', service: 'صيانة شاشة LED', device: 'TCL 43"', issue: 'لا يعمل الصوت', status: 'progress', tech: 'يوسف', date: '2026-04-27', amount: 38 },
];

const STATUS_LBL = { new: 'جديد', progress: 'قيد الإصلاح', done: 'مكتمل', cancelled: 'ملغي' };

function RepairsPage() {
  const [lang, setLang] = useState('ar');
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const isAr = lang === 'ar';
  const t = T[lang];

  const filtered = REPAIRS.filter(r =>
    (filter === 'all' || r.status === filter) &&
    (search === '' || r.customer.includes(search) || r.id.includes(search))
  );

  const counts = { all: REPAIRS.length, new: 0, progress: 0, done: 0, cancelled: 0 };
  REPAIRS.forEach(r => counts[r.status]++);

  return (
    <AdminShell active="repairs" lang={lang} setLang={setLang}>
      <div className="page-head">
        <div>
          <h1>{t.repairs}</h1>
          <div className="sub">{isAr ? `إدارة جميع طلبات الصيانة • ${REPAIRS.length} طلب` : `Manage all repair tickets • ${REPAIRS.length} total`}</div>
        </div>
        <div className="page-head-actions">
          <button className="btn btn-outline"><AICON.Download /> {t.export}</button>
          <button className="btn btn-primary"><AICON.Plus /> {isAr ? 'طلب صيانة جديد' : 'New Repair'}</button>
        </div>
      </div>

      {/* KPI MINI */}
      <div className="kpi-grid" style={{gridTemplateColumns: 'repeat(4, 1fr)'}}>
        <div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Wrench /></div></div><div className="num">{counts.new}</div><div className="label">{isAr ? 'جديدة' : 'New'}</div></div>
        <div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Wrench /></div></div><div className="num">{counts.progress}</div><div className="label">{isAr ? 'قيد الإصلاح' : 'In Progress'}</div></div>
        <div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Check /></div></div><div className="num">{counts.done}</div><div className="label">{isAr ? 'مكتملة' : 'Completed'}</div></div>
        <div className="kpi purple"><div className="kpi-head"><div className="ico"><AICON.X /></div></div><div className="num">{counts.cancelled}</div><div className="label">{isAr ? 'ملغاة' : 'Cancelled'}</div></div>
      </div>

      <div className="filter-bar">
        <div className="tab-pills">
          {['all','new','progress','done','cancelled'].map(s => (
            <button key={s} className={`tab-pill ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>
              {s === 'all' ? (isAr ? 'الكل' : 'All') : (isAr ? STATUS_LBL[s] : s)} ({counts[s]})
            </button>
          ))}
        </div>
        <input type="text" placeholder={isAr ? 'بحث...' : 'Search...'} value={search} onChange={e => setSearch(e.target.value)} style={{flex: 1, minWidth: 180}} />
        <select><option>{isAr ? 'كل الفنيين' : 'All Technicians'}</option><option>يوسف</option><option>كريم</option></select>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>{isAr ? 'رقم الطلب' : 'Ticket'}</th>
                <th>{isAr ? 'العميل' : 'Customer'}</th>
                <th>{isAr ? 'الخدمة والجهاز' : 'Service & Device'}</th>
                <th>{isAr ? 'المشكلة' : 'Issue'}</th>
                <th>{isAr ? 'الفني' : 'Tech'}</th>
                <th>{isAr ? 'الحالة' : 'Status'}</th>
                <th>{isAr ? 'التاريخ' : 'Date'}</th>
                <th>{isAr ? 'المبلغ' : 'Amount'}</th>
                <th>{isAr ? 'إجراءات' : 'Actions'}</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(r => (
                <tr key={r.id}>
                  <td style={{fontWeight: 700, color: 'var(--orange-dark)'}}>{r.id}</td>
                  <td>
                    <div className="av-row">
                      <div className="av">{r.initial}</div>
                      <div>
                        <div className="name">{r.customer}</div>
                        <div className="meta">{r.phone}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div style={{fontWeight: 600}}>{r.service}</div>
                    <div style={{fontSize: 12, color: 'var(--slate)'}}>{r.device}</div>
                  </td>
                  <td style={{color: 'var(--slate)'}}>{r.issue}</td>
                  <td>{r.tech}</td>
                  <td><span className={`pill ${r.status}`}>{isAr ? STATUS_LBL[r.status] : r.status}</span></td>
                  <td style={{color: 'var(--slate)', fontSize: 12}}>{r.date}</td>
                  <td style={{fontWeight: 700}}>{r.amount > 0 ? `${r.amount} د.أ` : '-'}</td>
                  <td>
                    <div className="row-actions">
                      <button className="action-btn"><AICON.Eye /></button>
                      <button className="action-btn"><AICON.Edit /></button>
                      <button className="action-btn"><AICON.Print /></button>
                      <button className="action-btn danger"><AICON.Trash /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </AdminShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RepairsPage />);
</script>
</body>
</html>
