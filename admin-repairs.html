<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات الصيانة - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="admin-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const INITIAL_REPAIRS = [];

const STATUS_LBL = { new: 'جديد', progress: 'قيد الإصلاح', done: 'مكتمل', cancelled: 'ملغي' };

function RepairsPage() {
  const [lang, setLang] = useState('ar');
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [repairs, setRepairs] = useState(INITIAL_REPAIRS);
  const [msg, setMsg] = useState('');

  const mapRepair = (r) => ({
    ...r,
    docId: r.id,
    id: r.requestId || r.id,
    customer: r.customerName || r.name || 'عميل',
    initial: (r.customerName || r.name || 'ع').trim().charAt(0),
    phone: r.phone || '',
    service: r.serviceLabel || r.type || r.serviceType || r.deviceType || 'صيانة',
    device: [r.deviceType, r.brand, r.model, r.deviceSize].filter(Boolean).join(' ') || '-',
    issue: Array.isArray(r.issues) ? r.issues.join('، ') : (r.faultDesc || r.issue || r.problem || ''),
    status: r.status || 'new',
    tech: r.tech || r.technician || '-',
    date: r.createdAt?.toDate ? r.createdAt.toDate().toISOString().slice(0,10) : (r.preferredDate || r.date || ''),
    amount: Number(r.total || r.price || r.amount || 0)
  });

  const loadRepairs = async () => {
    try {
      const rows = await window.WesamFirebase.getCollection('service_requests', { limit: 300 });
      setRepairs(rows.map(mapRepair));
      setMsg('تم تحديث طلبات الصيانة من Firebase');
      setTimeout(() => setMsg(''), 2500);
    } catch (err) {
      console.error(err);
      alert('تعذر تحميل طلبات الصيانة من Firebase: ' + err.message);
    }
  };

  useEffect(() => { loadRepairs(); }, []);

  const viewRepair = (r) => {
    alert(`تفاصيل طلب الصيانة\n\nرقم الطلب: ${r.id}\nالعميل: ${r.customer}\nالهاتف: ${r.phone}\nالخدمة: ${r.service}\nالجهاز: ${r.device}\nالمشكلة: ${r.issue}\nالفني: ${r.tech}\nالحالة: ${STATUS_LBL[r.status] || r.status}\nالتاريخ: ${r.date}\nالمبلغ: ${r.amount || 0} د.أ`);
  };

  const editRepair = async (r) => {
    const status = prompt('اكتب الحالة: new أو progress أو done أو cancelled', r.status);
    if (status === null) return;
    const tech = prompt('اسم الفني', r.tech === '-' ? '' : r.tech);
    if (tech === null) return;
    const amountText = prompt('المبلغ بالدينار', String(r.amount || 0));
    if (amountText === null) return;
    const issue = prompt('وصف المشكلة', r.issue || '');
    if (issue === null) return;
    try {
      const payload = {
        status: status || r.status,
        tech: tech || '-',
        technician: tech || '-',
        amount: Number(amountText || 0),
        total: Number(amountText || 0),
        faultDesc: issue,
        issue: issue
      };
      await window.WesamFirebase.setDoc('service_requests', r.docId, payload, true);
      await loadRepairs();
      alert('تم حفظ تعديل طلب الصيانة في Firebase');
    } catch (err) {
      console.error(err);
      alert('تعذر حفظ التعديل: ' + err.message);
    }
  };

  const deleteRepair = async (r) => {
    if (!confirm(`هل تريد حذف طلب الصيانة ${r.id} نهائيًا من Firebase؟`)) return;
    try {
      await window.WesamFirebase.deleteDoc('service_requests', r.docId);
      setRepairs(prev => prev.filter(x => x.docId !== r.docId));
      alert('تم حذف طلب الصيانة من Firebase');
    } catch (err) {
      console.error(err);
      alert('تعذر حذف الطلب: ' + err.message);
    }
  };

  const printRepair = (r) => {
    const w = window.open('', '_blank', 'width=800,height=900');
    if (!w) return window.print();
    w.document.write(`<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>طلب صيانة ${r.id}</title><style>body{font-family:Arial,Tahoma,sans-serif;padding:30px;line-height:1.9}h1{color:#f97316}.box{border:1px solid #ddd;border-radius:12px;padding:18px}table{width:100%;border-collapse:collapse}td{border-bottom:1px solid #eee;padding:10px}</style></head><body><h1>وسام للإلكترونيات - طلب صيانة</h1><div class="box"><table><tr><td>رقم الطلب</td><td>${r.id}</td></tr><tr><td>العميل</td><td>${r.customer}</td></tr><tr><td>الهاتف</td><td>${r.phone}</td></tr><tr><td>الخدمة</td><td>${r.service}</td></tr><tr><td>الجهاز</td><td>${r.device}</td></tr><tr><td>المشكلة</td><td>${r.issue}</td></tr><tr><td>الفني</td><td>${r.tech}</td></tr><tr><td>الحالة</td><td>${STATUS_LBL[r.status] || r.status}</td></tr><tr><td>التاريخ</td><td>${r.date}</td></tr><tr><td>المبلغ</td><td>${r.amount || 0} د.أ</td></tr></table></div><script>window.onload=()=>window.print()<\/script></body></html>`);
    w.document.close();
  };
  const isAr = lang === 'ar';
  const t = T[lang];

  const filtered = repairs.filter(r =>
    (filter === 'all' || r.status === filter) &&
    (search === '' || r.customer.includes(search) || r.id.includes(search))
  );

  const counts = { all: repairs.length, new: 0, progress: 0, done: 0, cancelled: 0 };
  repairs.forEach(r => counts[r.status]++);

  return (
    <AdminShell active="repairs" lang={lang} setLang={setLang}>
      <div className="page-head">
        <div>
          <h1>{t.repairs}</h1>
          <div className="sub">{isAr ? `إدارة جميع طلبات الصيانة • ${repairs.length} طلب` : `Manage all repair tickets • ${repairs.length} total`}</div>
        </div>
        <div className="page-head-actions">
          <button className="btn btn-outline" onClick={() => window.print()}><AICON.Download /> {t.export}</button>
          <button className="btn btn-outline" onClick={loadRepairs}>تحديث من Firebase</button>
          <a className="btn btn-primary" href="request.html"><AICON.Plus /> {isAr ? 'طلب صيانة جديد' : 'New Repair'}</a>
        </div>
      </div>

      {msg && <div className="save-msg ok" style={{marginBottom: 14}}>{msg}</div>}

      {/* KPI MINI */}
      <div className="kpi-grid" style={{gridTemplateColumns: 'repeat(4, 1fr)'}}>
        <div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Wrench /></div></div><div className="num">{counts.new}</div><div className="label">{isAr ? 'جديدة' : 'New'}</div></div>
        <div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Wrench /></div></div><div className="num">{counts.progress}</div><div className="label">{isAr ? 'قيد الإصلاح' : 'In Progress'}</div></div>
        <div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Check /></div></div><div className="num">{counts.done}</div><div className="label">{isAr ? 'مكتملة' : 'Completed'}</div></div>
        <div className="kpi purple"><div className="kpi-head"><div className="ico"><AICON.X /></div></div><div className="num">{counts.cancelled}</div><div className="label">{isAr ? 'ملغاة' : 'Cancelled'}</div></div>
      </div>

      <div className="filter-bar">
        <div className="tab-pills">
          {['all','new','progress','done','cancelled'].map(s => (
            <button key={s} className={`tab-pill ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>
              {s === 'all' ? (isAr ? 'الكل' : 'All') : (isAr ? STATUS_LBL[s] : s)} ({counts[s]})
            </button>
          ))}
        </div>
        <input type="text" placeholder={isAr ? 'بحث...' : 'Search...'} value={search} onChange={e => setSearch(e.target.value)} style={{flex: 1, minWidth: 180}} />
        <select><option>{isAr ? 'كل الفنيين' : 'All Technicians'}</option><option>يوسف</option><option>كريم</option></select>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>{isAr ? 'رقم الطلب' : 'Ticket'}</th>
                <th>{isAr ? 'العميل' : 'Customer'}</th>
                <th>{isAr ? 'الخدمة والجهاز' : 'Service & Device'}</th>
                <th>{isAr ? 'المشكلة' : 'Issue'}</th>
                <th>{isAr ? 'الفني' : 'Tech'}</th>
                <th>{isAr ? 'الحالة' : 'Status'}</th>
                <th>{isAr ? 'التاريخ' : 'Date'}</th>
                <th>{isAr ? 'المبلغ' : 'Amount'}</th>
                <th>{isAr ? 'إجراءات' : 'Actions'}</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(r => (
                <tr key={r.id}>
                  <td style={{fontWeight: 700, color: 'var(--orange-dark)'}}>{r.id}</td>
                  <td>
                    <div className="av-row">
                      <div className="av">{r.initial}</div>
                      <div>
                        <div className="name">{r.customer}</div>
                        <div className="meta">{r.phone}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div style={{fontWeight: 600}}>{r.service}</div>
                    <div style={{fontSize: 12, color: 'var(--slate)'}}>{r.device}</div>
                  </td>
                  <td style={{color: 'var(--slate)'}}>{r.issue}</td>
                  <td>{r.tech}</td>
                  <td><span className={`pill ${r.status}`}>{isAr ? STATUS_LBL[r.status] : r.status}</span></td>
                  <td style={{color: 'var(--slate)', fontSize: 12}}>{r.date}</td>
                  <td style={{fontWeight: 700}}>{r.amount > 0 ? `${r.amount} د.أ` : '-'}</td>
                  <td>
                    <div className="row-actions">
                      <button className="action-btn" title="عرض" onClick={() => viewRepair(r)}><AICON.Eye /></button>
                      <button className="action-btn" title="تعديل" onClick={() => editRepair(r)}><AICON.Edit /></button>
                      <button className="action-btn" title="طباعة" onClick={() => printRepair(r)}><AICON.Print /></button>
                      <button className="action-btn danger" title="حذف" onClick={() => deleteRepair(r)}><AICON.Trash /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </AdminShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RepairsPage />);
</script>
</body>
</html>
