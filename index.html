<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وسام للإلكترونيات | صيانة وبيع الأجهزة الإلكترونية - عمّان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* HOME PAGE === */
.hero {
  position: relative;
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 60%, #334155 100%);
  color: #fff;
  overflow: hidden;
  padding: 64px 0 80px;
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 80% 20%, rgba(249,115,22,0.25), transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(249,115,22,0.12), transparent 50%);
  pointer-events: none;
}
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.hero-grid {
  position: relative;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  align-items: center;
  z-index: 1;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(249,115,22,0.15);
  border: 1px solid rgba(249,115,22,0.35);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: #FED7AA;
  margin-bottom: 20px;
}
.hero h1 {
  font-size: 56px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}
.hero h1 .accent {
  color: #F97316;
  position: relative;
}
.hero p.lead {
  font-size: 19px;
  color: #CBD5E1;
  margin-bottom: 32px;
  max-width: 560px;
  line-height: 1.7;
}
.hero-cta { display: flex; gap: 14px; flex-wrap: wrap; }
.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.1);
  max-width: 560px;
}
.hero-stat .num {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.hero-stat .lbl {
  font-size: 13px;
  color: #94A3B8;
  margin-top: 4px;
}

.hero-visual {
  position: relative;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(3, 100px);
  gap: 14px;
}
.float-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #fff;
}
.float-card .ico-box {
  width: 38px; height: 38px;
  background: var(--orange);
  border-radius: 10px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.float-card.span2 { grid-column: span 2; }
.float-card.tall { grid-row: span 2; flex-direction: column; align-items: flex-start; }
.float-card .title-sm { font-weight: 700; font-size: 15px; }
.float-card .desc-sm { font-size: 12px; color: #CBD5E1; }
.float-card.featured {
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  border-color: transparent;
}
.float-card.featured .ico-box { background: rgba(255,255,255,0.2); }

/* === SECTIONS === */
.section { padding: 80px 0; }
.section-light { background: #fff; }
.section-head {
  text-align: center;
  max-width: 720px;
  margin: 0 auto 48px;
}
.section-eyebrow {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  color: var(--orange-dark);
  background: var(--orange-light);
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 16px;
}
.section h2 {
  font-size: 40px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.01em;
}
.section h2 .accent { color: var(--orange); }
.section .sub {
  font-size: 17px;
  color: var(--slate);
  line-height: 1.7;
}

/* === SERVICE CARDS === */
.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.service-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.service-card::before {
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  background: var(--orange-light);
  border-radius: 0 0 0 80px;
  opacity: 0;
  transition: opacity .25s;
}
.service-card:hover {
  border-color: var(--orange);
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.service-card:hover::before { opacity: 1; }
.service-card .ico {
  width: 56px; height: 56px;
  background: var(--orange-light);
  color: var(--orange-dark);
  border-radius: 14px;
  display: grid; place-items: center;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}
.service-card:hover .ico { background: var(--orange); color: #fff; }
.service-card h3 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--navy);
}
.service-card p {
  font-size: 14px;
  color: var(--slate);
  line-height: 1.7;
  flex: 1;
  margin-bottom: 18px;
}
.service-card .price-tag {
  font-size: 12px;
  color: var(--slate);
  margin-bottom: 6px;
}
.service-card .price-tag b { color: var(--orange-dark); font-size: 18px; font-weight: 800; }
.service-card .arrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--orange-dark);
  font-weight: 700;
  font-size: 14px;
  margin-top: auto;
}
.service-card .arrow svg { transition: transform .2s; }
.service-card:hover .arrow svg { transform: translateX(-4px); }

/* === OFFER BANNER === */
.offer-banner {
  background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
  border-radius: 24px;
  padding: 48px;
  color: #fff;
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 32px;
  align-items: center;
}
.offer-banner::before {
  content: "";
  position: absolute;
  top: -50%; right: -10%;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.offer-banner::after {
  content: "";
  position: absolute;
  bottom: -30%; left: -5%;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.offer-banner > * { position: relative; z-index: 1; }
.offer-content .tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.2);
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
}
.offer-content h3 {
  font-size: 38px;
  font-weight: 800;
  margin-bottom: 12px;
  line-height: 1.15;
}
.offer-content p {
  font-size: 17px;
  color: #FFEDD5;
  margin-bottom: 24px;
  line-height: 1.6;
}
.offer-content .btn-primary {
  background: #fff;
  color: var(--orange-dark);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}
.offer-content .btn-primary:hover { background: #fff; transform: translateY(-2px); }
.offer-percent {
  text-align: center;
}
.offer-percent .big {
  font-size: 140px;
  font-weight: 900;
  line-height: 1;
  color: rgba(255,255,255,0.95);
  letter-spacing: -0.05em;
}
.offer-percent .lbl {
  font-size: 16px;
  font-weight: 600;
  margin-top: 8px;
}

/* === CATEGORY CARDS (PRODUCT CATEGORIES) === */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
.cat-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  text-align: center;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.cat-card:hover {
  border-color: var(--orange);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.cat-card .img-wrap {
  width: 100%;
  margin-bottom: 14px;
}
.cat-card h4 {
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 4px;
}
.cat-card .count {
  font-size: 13px;
  color: var(--slate);
  margin-bottom: 12px;
}
.cat-card .view {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--orange-dark);
  font-weight: 700;
  font-size: 13px;
}

/* === FEATURES STRIP === */
.features-strip {
  background: var(--navy);
  color: #fff;
  border-radius: 24px;
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.feature-item .ico {
  width: 48px; height: 48px;
  background: rgba(249,115,22,0.15);
  color: var(--orange);
  border-radius: 12px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.feature-item h4 { font-size: 16px; margin-bottom: 4px; font-weight: 700; }
.feature-item p { font-size: 13px; color: #94A3B8; line-height: 1.6; }

/* === HOW IT WORKS === */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  position: relative;
}
.step-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  position: relative;
}
.step-num {
  width: 40px; height: 40px;
  background: var(--orange);
  color: #fff;
  border-radius: 50%;
  display: grid; place-items: center;
  font-weight: 800;
  margin: 0 auto 14px;
  font-size: 16px;
}
.step-card h4 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.step-card p { font-size: 13px; color: var(--slate); line-height: 1.6; }

/* === CTA SECTION === */
.cta-section {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
  border-radius: 24px;
  padding: 56px 48px;
  color: #fff;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.cta-section::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(249,115,22,0.2), transparent 60%);
}
.cta-section > * { position: relative; }
.cta-section h2 { font-size: 36px; margin-bottom: 12px; }
.cta-section p { font-size: 17px; color: #CBD5E1; margin-bottom: 28px; }
.cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 40px; }
  .hero-visual { grid-template-rows: repeat(3, 80px); }
  .services-grid { grid-template-columns: 1fr 1fr; }
  .cat-grid { grid-template-columns: 1fr 1fr; }
  .features-strip { grid-template-columns: 1fr 1fr; }
  .steps-grid { grid-template-columns: 1fr 1fr; }
  .offer-banner { grid-template-columns: 1fr; padding: 32px; text-align: center; }
  .offer-content h3 { font-size: 28px; }
  .offer-percent .big { font-size: 100px; }
}
@media (max-width: 600px) {
  .services-grid { grid-template-columns: 1fr; }
  .cat-grid { grid-template-columns: 1fr 1fr; }
  .features-strip { grid-template-columns: 1fr; padding: 24px; }
  .steps-grid { grid-template-columns: 1fr; }
  .section h2 { font-size: 28px; }
  .hero h1 { font-size: 32px; }
  .cta-section { padding: 36px 24px; }
}
</style>
</head>
<body>
<div id="root"></div>

      {/* FEATURES */}
      <section className="section section-light">
        <div className="container">
          <div className="features-strip">
            {features.map((f, i) =>

      {/* CTA */}

          <div className="cta-section">
