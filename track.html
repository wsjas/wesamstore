<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>تتبع الطلب - وسام للإلكترونيات</title><link rel="stylesheet" href="styles.css"/><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>.track-box{max-width:760px;margin:45px auto 80px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:var(--shadow-sm)}.result{margin-top:18px;padding:18px;border-radius:14px;background:var(--bg);line-height:2}</style></head><body><div id="root"></div><script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script><script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script><script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script><script type="text/babel" src="components.jsx"></script><script type="text/babel">
const {useState}=React;function TrackPage(){const [q,setQ]=useState('');const [loading,setLoading]=useState(false);const [res,setRes]=useState(null);const [err,setErr]=useState('');const search=async()=>{setErr('');setRes(null);if(!q.trim()){setErr('اكتب رقم الطلب أولاً');return}setLoading(true);try{let rows=await window.WesamFirebase.getCollection('orders',{where:[['orderId','==',q.trim()]],limit:1});let type='طلب متجر';if(!rows.length){rows=await window.WesamFirebase.getCollection('service_requests',{where:[['requestId','==',q.trim()]],limit:1});type='طلب صيانة'}if(rows.length)setRes({type,...rows[0]});else setErr('لم يتم العثور على الطلب. تأكد من كتابة الرقم كما هو.')}catch(e){console.error(e);setErr('تعذر التتبع بسبب الصلاحيات أو الاتصال.')}finally{setLoading(false)}};return <><TopBar/><Nav/><header className="page-header"><div className="container"><Breadcrumb items={[{label:'الرئيسية',href:'index.html'},{label:'تتبع الطلب'}]}/><h1>تتبع الطلب</h1><p>ابحث برقم طلب المتجر OR- أو رقم طلب الصيانة SR-.</p></div></header><main className="container"><div className="track-box"><label>رقم الطلب</label><div style={{display:'flex',gap:10,marginTop:8}}><input className="form-control" value={q} onChange={e=>setQ(e.target.value)} placeholder="مثال: OR-12345678 أو SR-12345678"/><button className="btn btn-primary" onClick={search}>{loading?'بحث...':'تتبع'}</button></div>{err&&<div className="result" style={{color:'#DC2626'}}>{err}</div>}{res&&<div className="result"><b>{res.type}</b><br/>الرقم: {res.orderId||res.requestId||res.id}<br/>الحالة: <b>{res.status||'غير محدد'}</b><br/>الاسم: {res.customerName||res.name||'غير محدد'}<br/>الهاتف: {res.phone||'غير محدد'}<br/>{res.total!==undefined&&<>الإجمالي: {Number(res.total||0).toFixed(2)} د.أ</>}</div>}</div></main><Footer/></>}
ReactDOM.createRoot(document.getElementById('root')).render(<TrackPage/>);
</script><script src="wesam-site-settings.js"></script>
</body></html>
