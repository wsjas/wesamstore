<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>العملاء - وسام للإلكترونيات</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin-styles.css"><style>.save-msg{margin:0 0 16px;padding:12px 14px;border-radius:12px;font-weight:700}.save-msg.ok{background:#DCFCE7;color:#166534}.save-msg.err{background:#FEE2E2;color:#991B1B}.mini-form{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;padding:16px}@media(max-width:800px){.mini-form{grid-template-columns:1fr}}</style></head><body><div id="root"></div><script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script><script src="firebase-config.js"></script><script type="text/babel" src="admin-components.jsx"></script><script type="text/babel" src="admin-shell.jsx"></script><script type="text/babel">
const {useState,useEffect}=React;const blank={id:'',name:'',phone:'',email:'',city:'عمّان',notes:''};
function CustomersPage(){const [lang,setLang]=useState('ar'),[customers,setCustomers]=useState([]),[form,setForm]=useState(blank),[msg,setMsg]=useState(null),[q,setQ]=useState('');const isAr=lang==='ar',t=T[lang];
 const load=async()=>{try{await window.WesamFirebase.ensureCoreCollections({force:true});const manual=await window.WesamFirebase.getCollection('customers',{limit:500});const orders=await window.WesamFirebase.getCollection('orders',{limit:500});const repairs=await window.WesamFirebase.getCollection('service_requests',{limit:500});const map=new Map();manual.forEach(c=>map.set(c.phone||c.id,{...c,orders:0,repairs:0,total:Number(c.total||0),source:'customers'}));orders.forEach(o=>{const k=o.phone||o.customerPhone||o.id;if(!k)return;const c=map.get(k)||{id:k,name:o.customerName||o.name||'عميل',phone:k,email:o.email||'',city:o.area||o.city||'',orders:0,repairs:0,total:0,source:'derived'};c.orders=(c.orders||0)+1;c.total=(Number(c.total)||0)+(Number(o.total)||0);map.set(k,c)});repairs.forEach(r=>{const k=r.phone||r.customerPhone||r.id;if(!k)return;const c=map.get(k)||{id:k,name:r.customerName||r.name||'عميل صيانة',phone:k,email:r.email||'',city:r.area||r.city||'',orders:0,repairs:0,total:0,source:'derived'};c.repairs=(c.repairs||0)+1;c.total=(Number(c.total)||0)+(Number(r.total||r.paid)||0);map.set(k,c)});setCustomers([...map.values()]);}catch(e){console.error(e);setMsg({type:'err',text:'تعذر تحميل العملاء من Firebase'})}};useEffect(()=>{load()},[]);
 const save=async()=>{if(!form.name.trim()||!form.phone.trim()){setMsg({type:'err',text:'الاسم والهاتف مطلوبان'});return}try{const data={name:form.name,phone:form.phone,email:form.email,city:form.city,notes:form.notes,status:'active'};if(form.id&&form.source==='customers')await window.WesamFirebase.setDoc('customers',form.id,data,true);else await window.WesamFirebase.addDoc('customers',data);setForm(blank);setMsg({type:'ok',text:'تم حفظ العميل في Firebase'});load()}catch(e){console.error(e);setMsg({type:'err',text:'فشل حفظ العميل'})}};const edit=c=>setForm({id:c.id,source:c.source,name:c.name||'',phone:c.phone||'',email:c.email||'',city:c.city||'',notes:c.notes||''});const del=async(c)=>{if(c.source!=='customers'){setMsg({type:'err',text:'هذا العميل مستخرج من الطلبات أو الصيانة. احذف المصدر الأصلي.'});return}if(!confirm('حذف العميل؟'))return;await window.WesamFirebase.deleteDoc('customers',c.id);load()};const list=customers.filter(c=>(c.name||'').includes(q)||(c.phone||'').includes(q));
 return <AdminShell active="customers" lang={lang} setLang={setLang}><div className="page-head"><div><h1>{t.customers}</h1><div className="sub">العملاء من customers + الطلبات + الصيانة — {customers.length} عميل</div></div><button className="btn btn-primary" onClick={save}><AICON.Plus/> {form.id?'تحديث العميل':'حفظ عميل جديد'}</button></div>{msg&&<div className={`save-msg ${msg.type}`}>{msg.text}</div>}<div className="card" style={{marginBottom:20}}><div className="card-head"><h3>إضافة/تعديل عميل</h3><button className="btn btn-outline btn-sm" onClick={()=>setForm(blank)}>تفريغ</button></div><div className="mini-form"><input className="form-control" placeholder="الاسم" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/><input className="form-control" placeholder="الهاتف" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/><input className="form-control" placeholder="البريد" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/><input className="form-control" placeholder="المدينة" value={form.city} onChange={e=>setForm({...form,city:e.target.value})}/><input className="form-control" placeholder="ملاحظات" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div></div><div className="filter-bar"><input type="text" placeholder="بحث بالاسم أو الهاتف..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:1,minWidth:220}}/><button className="btn btn-outline" onClick={load}>تحديث من Firebase</button></div><div className="card"><div className="table-wrap"><table className="tbl"><thead><tr><th>العميل</th><th>الهاتف</th><th>المدينة</th><th>الطلبات</th><th>الصيانات</th><th>إجمالي الإنفاق</th><th>المصدر</th><th>إجراءات</th></tr></thead><tbody>{list.map(c=><tr key={(c.phone||c.id)+'-'+c.source}><td><div className="av-row"><div className="av">{(c.name||'ع').charAt(0)}</div><div><div className="name">{c.name}</div><div className="meta">{c.email}</div></div></div></td><td style={{fontFamily:'monospace'}}>{c.phone}</td><td>{c.city}</td><td><span className="pill new">{c.orders||0}</span></td><td><span className="pill progress">{c.repairs||0}</span></td><td style={{fontWeight:700,color:'var(--orange-dark)'}}>{Number(c.total||0).toFixed(2)} د.أ</td><td>{c.source==='customers'?'يدوي':'تلقائي'}</td><td><div className="row-actions"><button className="action-btn" onClick={()=>edit(c)}><AICON.Edit/></button><button className="action-btn danger" onClick={()=>del(c)}><AICON.Trash/></button></div></td></tr>)}</tbody></table></div></div></AdminShell>}
ReactDOM.createRoot(document.getElementById('root')).render(<CustomersPage/>);
</script></body></html>
