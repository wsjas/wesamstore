<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>المنتجات والمخزون - وسام للإلكترونيات</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin-styles.css"><style>.save-msg{margin:0 0 16px;padding:12px 14px;border-radius:12px;font-weight:700}.save-msg.ok{background:#DCFCE7;color:#166534}.save-msg.err{background:#FEE2E2;color:#991B1B}.mini-form{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;padding:16px;border-top:1px solid var(--border)}@media(max-width:1000px){.mini-form{grid-template-columns:1fr 1fr}}@media(max-width:600px){.mini-form{grid-template-columns:1fr}}</style></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script><script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script><script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script><script src="firebase-config.js"></script><script type="text/babel" src="admin-components.jsx"></script><script type="text/babel" src="admin-shell.jsx"></script>
<script type="text/babel">
const {useState,useEffect}=React;const blank={id:'',name:'',category:'ريسيفرات',sell:'',oldPrice:'',stock:'',deliveryFee:'0',image:'',description:'',active:true};
function ProductsPage(){const [lang,setLang]=useState('ar'),[products,setProducts]=useState([]),[form,setForm]=useState(blank),[msg,setMsg]=useState(null),[saving,setSaving]=useState(false),[cat,setCat]=useState('all');const isAr=lang==='ar',t=T[lang];
 const load=async()=>{try{await window.WesamFirebase.ensureCoreCollections({force:true});const rows=await window.WesamFirebase.getCollection('products',{limit:500});setProducts(rows.map(window.WesamFirebase.normalizeProduct));setMsg(null)}catch(e){console.error(e);setMsg({type:'err',text:'تعذر تحميل المنتجات من Firebase. تأكد من القواعد ومن المشروع '+(window.WesamFirebase&&window.WesamFirebase.projectId||'')})}};useEffect(()=>{load()},[]);
 const edit=p=>setForm({id:p.id,name:p.name||'',category:p.category||p.cat||'',sell:p.price||p.sell||'',oldPrice:p.old||'',stock:p.stock||'',deliveryFee:p.deliveryFee||0,image:p.image||p.imageUrl||'',description:p.description||'',active:p.active!==false});
 const clear=()=>setForm(blank);const save=async()=>{if(!form.name.trim()){setMsg({type:'err',text:'اسم المنتج مطلوب'});return}setSaving(true);try{const data={name:form.name.trim(),category:form.category.trim()||'عام',sell:Number(form.sell)||0,price:Number(form.sell)||0,oldPrice:Number(form.oldPrice)||0,stock:Number(form.stock)||0,deliveryFee:Number(form.deliveryFee)||0,image:form.image.trim(),description:form.description.trim(),active:form.active!==false,visible:form.active!==false};if(form.id){await window.WesamFirebase.setDoc('products',form.id,data,true)}else{await window.WesamFirebase.addDoc('products',data)}setMsg({type:'ok',text:'تم حفظ المنتج في Firebase'});clear();await load()}catch(e){console.error(e);setMsg({type:'err',text:'فشل حفظ المنتج. راجع Firestore Rules'})}finally{setSaving(false)}};
 const del=async(id)=>{if(!confirm('حذف المنتج من Firebase؟'))return;try{await window.WesamFirebase.deleteDoc('products',id);setMsg({type:'ok',text:'تم حذف المنتج'});load()}catch(e){setMsg({type:'err',text:'فشل الحذف من Firebase'})}};
 const cats=['all',...new Set(products.map(p=>p.category||p.cat).filter(Boolean))];const filtered=products.filter(p=>cat==='all'||(p.category||p.cat)===cat);const totalStock=products.reduce((s,p)=>s+(Number(p.stock)||0),0),totalValue=products.reduce((s,p)=>s+(Number(p.stock)||0)*(Number(p.price)||0),0);
 return <AdminShell active="products" lang={lang} setLang={setLang}><div className="page-head"><div><h1>{t.products}</h1><div className="sub">تحميل وحفظ المنتجات مباشرة من Firebase — {window.WesamFirebase.projectId}</div></div><div className="page-head-actions"><button className="btn btn-outline" onClick={()=>window.print()}><AICON.Download/> {t.export}</button><button className="btn btn-primary" onClick={save} disabled={saving}><AICON.Plus/> {saving?'جاري الحفظ...':(form.id?'تحديث المنتج':'حفظ منتج جديد')}</button></div></div>{msg&&<div className={`save-msg ${msg.type}`}>{msg.text}</div>}
 <div className="kpi-grid"><div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Box/></div></div><div className="num">{products.length}</div><div className="label">إجمالي المنتجات</div></div><div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Box/></div></div><div className="num">{totalStock}</div><div className="label">القطع في المخزن</div></div><div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Tag/></div></div><div className="num">{totalValue.toFixed(2)} د.أ</div><div className="label">قيمة المخزون</div></div><div className="kpi purple"><div className="kpi-head"><div className="ico"><AICON.Bell/></div></div><div className="num">{products.filter(p=>Number(p.stock)<=5).length}</div><div className="label">تنبيهات المخزون</div></div></div>
 <div className="card" id="product-form" style={{marginBottom:20}}><div className="card-head"><h3>{form.id?'تعديل منتج':'إضافة منتج إلى Firebase'}</h3><button className="btn btn-outline btn-sm" onClick={clear}>تفريغ</button></div><div className="mini-form"><input className="form-control" placeholder="اسم المنتج" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/><input className="form-control" placeholder="الفئة" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}/><input className="form-control" type="number" placeholder="سعر البيع" value={form.sell} onChange={e=>setForm({...form,sell:e.target.value})}/><input className="form-control" type="number" placeholder="السعر القديم" value={form.oldPrice} onChange={e=>setForm({...form,oldPrice:e.target.value})}/><input className="form-control" type="number" placeholder="المخزون" value={form.stock} onChange={e=>setForm({...form,stock:e.target.value})}/><input className="form-control" type="number" placeholder="التوصيل" value={form.deliveryFee} onChange={e=>setForm({...form,deliveryFee:e.target.value})}/><input className="form-control" style={{gridColumn:'span 2'}} placeholder="رابط الصورة" value={form.image} onChange={e=>setForm({...form,image:e.target.value})}/><input className="form-control" style={{gridColumn:'span 3'}} placeholder="الوصف" value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/><label style={{display:'flex',alignItems:'center',gap:8,fontWeight:700}}><input type="checkbox" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})}/> ظاهر في المتجر</label></div></div>
 <div className="filter-bar"><div className="tab-pills" style={{flexWrap:'wrap'}}>{cats.map(c=><button key={c} className={`tab-pill ${cat===c?'active':''}`} onClick={()=>setCat(c)}>{c==='all'?'الكل':c}</button>)}</div><button className="btn btn-outline" onClick={load}>تحديث من Firebase</button></div>
 <div className="card"><div className="table-wrap"><table className="tbl"><thead><tr><th>ID</th><th>المنتج</th><th>الفئة</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>{filtered.map(p=><tr key={p.id}><td style={{fontFamily:'monospace',fontSize:12}}>{p.id}</td><td style={{fontWeight:700}}>{p.name}</td><td><span className="pill pending">{p.category||p.cat}</span></td><td>{p.price} د.أ</td><td>{p.stock}</td><td><span className={`pill ${p.active?'done':'canceled'}`}>{p.active?'ظاهر':'مخفي'}</span></td><td><div className="row-actions"><button className="action-btn" onClick={()=>edit(p)}><AICON.Edit/></button><button className="action-btn danger" onClick={()=>del(p.id)}><AICON.Trash/></button></div></td></tr>)}</tbody></table></div>{filtered.length===0&&<div style={{padding:30,textAlign:'center',color:'var(--slate)'}}>لا توجد منتجات محفوظة</div>}</div></AdminShell>}
ReactDOM.createRoot(document.getElementById('root')).render(<ProductsPage/>);
</script></body></html>
