<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتجات والمخزون - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="admin-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const INITIAL_PRODUCTS = [];

function ProductsPage() {
  const [lang, setLang] = useState('ar');
  const [cat, setCat] = useState('all');
  const [products, setProducts] = useState(INITIAL_PRODUCTS);
  const [loadError, setLoadError] = useState('');
  useEffect(() => {
    window.WesamFirebase.loadProducts().then(list => {
      setProducts(list.map(p => ({ sku: p.id, name: p.name, cat: p.cat, price: p.price, stock: p.stock, sold: 0, status: p.stock <= 0 ? 'out' : p.stock <= 5 ? 'low' : 'in' })));
    }).catch(err => { console.error(err); setLoadError('تعذر تحميل المنتجات من Firebase'); });
  }, []);
  const isAr = lang === 'ar';
  const t = T[lang];

  const cats = ['all', ...new Set(products.map(p => p.cat))];
  const filtered = products.filter(p => cat === 'all' || p.cat === cat);

  const totalStock = products.reduce((s,p) => s+p.stock, 0);
  const totalValue = products.reduce((s,p) => s+p.stock*p.price, 0);
  const lowCount = products.filter(p => p.status === 'low').length;
  const outCount = products.filter(p => p.status === 'out').length;

  return (
    <AdminShell active="products" lang={lang} setLang={setLang}>
      <div className="page-head">
        <div>
          <h1>{t.products}</h1>
          <div className="sub">{isAr ? 'إدارة المنتجات والمخزون والأسعار' : 'Manage products, stock, and prices'}</div>
        </div>
        <div className="page-head-actions">
          <button className="btn btn-outline" onClick={() => window.print()}><AICON.Download /> {t.export}</button>
          <a className="btn btn-primary" href="#product-form"><AICON.Plus /> {isAr ? 'منتج جديد' : 'New Product'}</a>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Box /></div></div><div className="num">{products.length}</div><div className="label">{isAr ? 'إجمالي المنتجات' : 'Total Products'}</div></div>
        <div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Box /></div></div><div className="num">{totalStock}</div><div className="label">{isAr ? 'القطع في المخزن' : 'Items in Stock'}</div></div>
        <div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Tag /></div></div><div className="num">{totalValue} د.أ</div><div className="label">{isAr ? 'قيمة المخزون' : 'Stock Value'}</div></div>
        <div className="kpi purple"><div className="kpi-head"><div className="ico" style={{background: 'var(--red-bg)', color: 'var(--red)'}}><AICON.Bell /></div></div><div className="num">{lowCount + outCount}</div><div className="label">{isAr ? 'تنبيهات المخزون' : 'Stock Alerts'}</div></div>
      </div>

      {loadError && <div className="card" style={{color: 'var(--red)', marginBottom: 16}}>{loadError}</div>}
      <div className="filter-bar">
        <div className="tab-pills" style={{flexWrap: 'wrap'}}>
          {cats.map(c => (
            <button key={c} className={`tab-pill ${cat === c ? 'active' : ''}`} onClick={() => setCat(c)}>{c === 'all' ? (isAr ? 'الكل' : 'All') : c}</button>
          ))}
        </div>
        <input type="text" placeholder={isAr ? 'بحث...' : 'Search...'} style={{flex: 1, minWidth: 180}} />
        <select><option>{isAr ? 'كل الحالات' : 'All Status'}</option><option>{isAr ? 'متوفر' : 'In Stock'}</option><option>{isAr ? 'مخزون منخفض' : 'Low Stock'}</option><option>{isAr ? 'نفد' : 'Out'}</option></select>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>SKU</th>
                <th>{isAr ? 'المنتج' : 'Product'}</th>
                <th>{isAr ? 'الفئة' : 'Category'}</th>
                <th>{isAr ? 'السعر' : 'Price'}</th>
                <th>{isAr ? 'المخزون' : 'Stock'}</th>
                <th>{isAr ? 'مبيعات' : 'Sold'}</th>
                <th>{isAr ? 'الحالة' : 'Status'}</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.sku}>
                  <td style={{fontFamily: 'monospace', fontSize: 12, color: 'var(--slate)'}}>{p.sku}</td>
                  <td style={{fontWeight: 600, color: 'var(--navy)'}}>{p.name}</td>
                  <td><span className="pill pending">{p.cat}</span></td>
                  <td style={{fontWeight: 700}}>{p.price} د.أ</td>
                  <td>
                    <div style={{fontWeight: 700}}>{p.stock}</div>
                    <div style={{height: 4, background: 'var(--bg)', borderRadius: 2, marginTop: 4, overflow: 'hidden', width: 60}}>
                      <div style={{height: '100%', width: `${Math.min(p.stock/2, 100)}%`, background: p.status === 'out' ? 'var(--red)' : p.status === 'low' ? 'var(--yellow)' : 'var(--green)'}}></div>
                    </div>
                  </td>
                  <td style={{color: 'var(--slate)'}}>{p.sold}</td>
                  <td>
                    <span className={`pill ${p.status === 'in' ? 'done' : p.status === 'low' ? 'progress' : 'cancelled'}`}>
                      {isAr ? ({in: 'متوفر', low: 'منخفض', out: 'نفد'})[p.status] : p.status}
                    </span>
                  </td>
                  <td>
                    <div className="row-actions">
                      <button className="action-btn"><AICON.Edit /></button>
                      <button className="action-btn danger"><AICON.Trash /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </AdminShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProductsPage />);
</script>
</body>
</html>
