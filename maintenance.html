<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز الصيانة - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.maint-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
  margin-bottom: 60px;
}
.maint-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: all .2s;
  display: flex;
  flex-direction: column;
}
.maint-card:hover { border-color: var(--orange); transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.maint-card .img-wrap { padding: 20px; background: linear-gradient(135deg, #FAFAF9, #F1F5F9); }
.maint-card .body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
.maint-card .head-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.maint-card .ico-sm {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--orange-light); color: var(--orange-dark);
  display: grid; place-items: center;
}
.maint-card h3 { font-size: 19px; font-weight: 800; color: var(--navy); }
.maint-card p { font-size: 14px; color: var(--slate); margin-bottom: 16px; line-height: 1.7; }
.maint-card ul { list-style: none; margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
.maint-card ul li { font-size: 13px; color: var(--navy-2); display: flex; gap: 8px; }
.maint-card ul li::before { content: "✓"; color: var(--green); font-weight: 800; }
.maint-card .price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-top: 1px dashed var(--border);
  margin-bottom: 12px;
}
.maint-card .price-row .lbl { font-size: 12px; color: var(--slate); }
.maint-card .price-row .val { font-size: 22px; font-weight: 800; color: var(--orange-dark); }
.maint-card .actions { display: flex; gap: 8px; margin-top: auto; }
.maint-card .actions a { flex: 1; justify-content: center; }

.guarantees {
  background: var(--navy);
  color: #fff;
  border-radius: 24px;
  padding: 48px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 32px;
  margin-bottom: 60px;
}
.guarantee-item h4 { font-size: 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; color: #fff; }
.guarantee-item h4 .ico { width: 32px; height: 32px; background: var(--orange); border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
.guarantee-item p { color: #CBD5E1; font-size: 14px; line-height: 1.7; }

@media (max-width: 880px) {
  .maint-grid { grid-template-columns: 1fr 1fr; }
  .guarantees { grid-template-columns: 1fr; padding: 28px; }
}
@media (max-width: 600px) {
  .maint-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">

  const services = [

    { kind: 'microwave', icon: <Icon.Microwave />, title: 'صيانة الميكروويف', desc: 'إصلاح الميكروويف من جميع الماركات وحل مشاكل التسخين والصوت.', perks: ['فحص الماغنترون', 'تنظيف داخلي', 'إصلاح لوحة التحكم', 'ضمان مكتوب'], price: '12 د.أ', href: 'request.html?type=microwave' },
    { kind: 'vacuum', icon: <Icon.Vacuum />, title: 'صيانة المكانس الكهربائية', desc: 'حلول لجميع مشاكل المكانس: ضعف شفط، انسداد، صوت غريب، أو توقف.', perks: ['تنظيف كامل', 'استبدال الفلاتر', 'إصلاح المحرّك', 'صيانة دورية'], price: '10 د.أ', href: 'request.html?type=vacuum' },
    { kind: 'remote', icon: <Icon.Remote />, title: 'برمجة وإصلاح الريموتات', desc: 'برمجة الريموتات الأصلية والبديلة وإصلاحها لجميع الأجهزة.', perks: ['برمجة فورية', 'استبدال البطاريات', 'إصلاح الأزرار', 'ضمان الموديلات'], price: '5 د.أ', href: 'request.html?type=remote' },
    { kind: 'receiver', icon: <Icon.Receiver />, title: 'صيانة الرسيفر', desc: 'إصلاح أجهزة الرسيفر وحل مشاكل الاستقبال والقنوات.', perks: ['تحديث القنوات', 'برمجة كاملة', 'إصلاح اللوحة', 'تركيب IPTV'], price: '8 د.أ', href: 'request.html?type=receiver' },

      </header>

      <section className="section">

                <div className="body">

          <div className="guarantees">
            <div className="guarantee-item">

            <div className="guarantee-item">
              <h4><span className="ico"><Icon.Award /></span> قطع أصلية</h4>
              <p>نستخدم قطع غيار أصلية فقط. لا نُركّب قطعاً مقلّدة، ونعرض لك القطعة قبل التركيب.</p>
            </div>
            <div className="guarantee-item">
              <h4><span className="ico"><Icon.Clock /></span> سرعة الإنجاز</h4>
              <p>أغلب الصيانات تُنجز في نفس اليوم. الحالات المعقّدة لا تتجاوز 48 ساعة في معظم الحالات.</p>
            </div>
          </div>

          <div style={{textAlign: 'center', maxWidth: 720, margin: '0 auto'}}>
            <h2 style={{fontSize: 32, marginBottom: 12}}>لم تجد جهازك؟</h2>
            <p style={{color: 'var(--slate)', marginBottom: 20, fontSize: 16}}>تواصل معنا مباشرة عبر الواتساب لمعرفة إن كنا نُصلح نوع جهازك، وسنرد عليك فوراً.</p>
            <a href="https://wa.me/962790781206" className="btn btn-primary"><Icon.Whatsapp /> راسلنا واتساب</a>
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MaintenancePage />);
</script>
<script src="wesam-site-settings.js"></script>
</body>
</html>
