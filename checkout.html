<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إتمام الطلب - وسام للإلكترونيات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
.checkout-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;margin:40px 0 70px}.box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--shadow-sm)}.order-item{display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}.order-item:last-child{border-bottom:0}.msg{padding:12px 14px;border-radius:12px;margin-bottom:16px;font-weight:700}.msg.err{background:#FEF2F2;color:#DC2626}.msg.ok{background:#ECFDF5;color:#16A34A}@media(max-width:880px){.checkout-grid{grid-template-columns:1fr}}
</style>
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const {useEffect,useMemo,useState}=React;
function CheckoutPage(){
 const [products,setProducts]=useState([]); const [cart,setCart]=useState({}); const [form,setForm]=useState({name:'',phone:'',area:'',address:'',notes:'',shippingMethod:'delivery'}); const [sending,setSending]=useState(false); const [msg,setMsg]=useState(null);
 useEffect(()=>{try{setCart(JSON.parse(localStorage.getItem('wesam_cart')||'{}')||{})}catch(e){}; window.WesamFirebase.loadProducts().then(setProducts).catch(e=>setMsg({type:'err',text:'تعذر تحميل المنتجات من Firebase.'}))},[]);
 const items=useMemo(()=>Object.entries(cart).map(([id,qty])=>({...products.find(p=>p.id===id),qty})).filter(i=>i.id),[cart,products]);
 const subtotal=items.reduce((s,i)=>s+(Number(i.price)||0)*i.qty,0); const delivery=form.shippingMethod==='delivery'?2:0; const total=subtotal+delivery;
 const update=(k,v)=>setForm(f=>({...f,[k]:v}));
 const submit=async()=>{setMsg(null); if(!items.length){setMsg({type:'err',text:'السلة فارغة.'});return} if(!form.name.trim()||!form.phone.trim()){setMsg({type:'err',text:'الاسم ورقم الهاتف مطلوبان.'});return} setSending(true); const orderId='OR-'+Date.now().toString().slice(-8); try{await window.WesamFirebase.addDoc('orders',{orderId,status:'pending',customerName:form.name,name:form.name,phone:form.phone,area:form.area,addressText:form.address,notes:form.notes,shippingMethod:form.shippingMethod,items:items.map(i=>({id:i.id,name:i.name,price:Number(i.price)||0,qty:i.qty,total:(Number(i.price)||0)*i.qty})),subtotal,deliveryFee:delivery,total,sourcePage:'checkout.html'}); localStorage.removeItem('wesam_cart'); setCart({}); setMsg({type:'ok',text:'تم إرسال الطلب بنجاح. رقم الطلب: '+orderId});}catch(e){console.error(e);setMsg({type:'err',text:'تعذر إرسال الطلب إلى Firebase. تحقق من قواعد Firestore أو الاتصال.'})}finally{setSending(false)}};
 return <><TopBar/><Nav active="shop"/><header className="page-header"><div className="container"><Breadcrumb items={[{label:'الرئيسية',href:'index.html'},{label:'المتجر',href:'shop.html'},{label:'إتمام الطلب'}]}/><h1>إتمام طلب الشراء</h1><p>أدخل بياناتك ليصل الطلب إلى لوحة Firebase في مجموعة orders.</p></div></header><main className="container checkout-grid"><section className="box"><h2 style={{marginBottom:16}}>بيانات العميل</h2>{msg&&<div className={'msg '+msg.type}>{msg.text}</div>}<div className="form-row"><div className="form-group"><label>الاسم *</label><input className="form-control" value={form.name} onChange={e=>update('name',e.target.value)}/></div><div className="form-group"><label>الهاتف *</label><input className="form-control" value={form.phone} onChange={e=>update('phone',e.target.value)} placeholder="07xxxxxxxx"/></div></div><div className="form-row"><div className="form-group"><label>المنطقة</label><input className="form-control" value={form.area} onChange={e=>update('area',e.target.value)}/></div><div className="form-group"><label>طريقة الاستلام</label><select className="form-control" value={form.shippingMethod} onChange={e=>update('shippingMethod',e.target.value)}><option value="delivery">توصيل داخل عمّان</option><option value="pickup">استلام من المحل</option></select></div></div><div className="form-group"><label>العنوان</label><textarea className="form-control" value={form.address} onChange={e=>update('address',e.target.value)}></textarea></div><div className="form-group"><label>ملاحظات</label><textarea className="form-control" value={form.notes} onChange={e=>update('notes',e.target.value)}></textarea></div><button className="btn btn-primary" onClick={submit} disabled={sending} style={{width:'100%',justifyContent:'center'}}>{sending?'جاري الإرسال...':'إرسال الطلب إلى Firebase'}</button></section><aside className="box"><h2 style={{marginBottom:16}}>ملخص السلة</h2>{items.length?items.map(i=><div className="order-item" key={i.id}><div><b>{i.name}</b><div style={{color:'var(--slate)',fontSize:13}}>الكمية: {i.qty}</div></div><b>{((Number(i.price)||0)*i.qty).toFixed(2)} د.أ</b></div>):<div className="empty-state">السلة فارغة. <a href="shop.html">اذهب للمتجر</a></div>}<div style={{marginTop:16,lineHeight:2}}><div>المجموع: <b>{subtotal.toFixed(2)} د.أ</b></div><div>التوصيل: <b>{delivery.toFixed(2)} د.أ</b></div><div style={{fontSize:20,color:'var(--orange-dark)'}}>الإجمالي: <b>{total.toFixed(2)} د.أ</b></div></div></aside></main><Footer/></>}
ReactDOM.createRoot(document.getElementById('root')).render(<CheckoutPage/>);
</script></body></html>
