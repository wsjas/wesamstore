<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>من نحن - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.about-intro {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  align-items: center;
  padding: 60px 0;
}
.about-intro h2 { font-size: 36px; line-height: 1.2; margin-bottom: 18px; }
.about-intro h2 .accent { color: var(--orange); }
.about-intro p { color: var(--slate); font-size: 16px; line-height: 1.8; margin-bottom: 16px; }
.about-visual {
  background: linear-gradient(135deg, var(--navy), var(--navy-2));
  border-radius: 24px;
  padding: 40px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.about-visual::before {
  content: "";
  position: absolute;
  top: -30%; right: -20%;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.3), transparent 60%);
}
.stat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  position: relative;
}
.stat-item:last-child { border-bottom: none; }
.stat-item .num { font-size: 28px; font-weight: 800; color: var(--orange); }
.stat-item .lbl { color: #CBD5E1; }

.values-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.value-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
}
.value-card .ico {
  width: 52px; height: 52px;
  background: var(--orange-light);
  color: var(--orange-dark);
  border-radius: 14px;
  display: grid; place-items: center;
  margin-bottom: 16px;
}
.value-card h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.value-card p { color: var(--slate); font-size: 14px; line-height: 1.7; }

@media (max-width: 880px) {
  .about-intro { grid-template-columns: 1fr; }
  .values-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
function AboutPage() {
  return (
    <>
      <TopBar />
      <Nav active="about" />

      <header className="page-header">
        <div className="container">
          <Breadcrumb items={[{label: 'الرئيسية', href: 'index.html'}, {label: 'من نحن'}]} />
          <h1>من نحن</h1>
          <p>متجر ومركز صيانة موثوق في عمّان، يجمع بين الخبرة الفنية والأسعار العادلة والضمان الحقيقي.</p>
        </div>
      </header>

      <section className="container">
        <div className="about-intro">
          <div>
            <h2>وسام للإلكترونيات: <span className="accent">صيانة وبيع</span> تحت سقف واحد</h2>
            <p>نحن متجر ومركز صيانة متخصص في عمّان نُصلح الشاشات والميكروويف والمكانس الكهربائية وأجهزة الرسيفر، ونوفّر الريموتات وملحقات الشاشات والكابلات بأسعار منافسة.</p>
            <p>نلتزم بالشفافية: كشف مجاني عند طلب الإصلاح، قطع غيار أصلية فقط، وضمان مكتوب على كل صيانة. هدفنا أن تكون التجربة سهلة وموثوقة من أول اتصال إلى تسليم الجهاز.</p>
            <a href="contact.html" className="btn btn-primary">تواصل معنا <Icon.ArrowLeft /></a>
          </div>
          <div className="about-visual">
            <div style={{position: 'relative'}}>
              <div className="stat-item"><span className="lbl">جهاز تم إصلاحه</span><span className="num">+5,000</span></div>
              <div className="stat-item"><span className="lbl">منتج في المتجر</span><span className="num">+200</span></div>
              <div className="stat-item"><span className="lbl">عميل راضٍ</span><span className="num">98%</span></div>
              <div className="stat-item"><span className="lbl">سنوات من الخبرة</span><span className="num">+10</span></div>
            </div>
          </div>
        </div>

        <div style={{paddingBottom: 80}}>
          <div className="section-head">
            <div className="section-eyebrow">قيمنا</div>
            <h2 style={{fontSize: 32}}>ما نلتزم به <span style={{color: 'var(--orange)'}}>في كل تعامل</span></h2>
          </div>
          <div className="values-grid">
            <div className="value-card">
              <div className="ico"><Icon.Shield /></div>
              <h3>ضمان حقيقي</h3>
              <p>كل إصلاح وكل قطعة مغطاة بضمان مكتوب. إذا تكرر العطل، نُصلحه مجاناً ضمن فترة الضمان.</p>
            </div>
            <div className="value-card">
              <div className="ico"><Icon.Award /></div>
              <h3>قطع أصلية</h3>
              <p>نستخدم قطع غيار أصلية فقط، ونعرض القطعة على العميل قبل التركيب لضمان الشفافية.</p>
            </div>
            <div className="value-card">
              <div className="ico"><Icon.Clock /></div>
              <h3>سرعة وانتظام</h3>
              <p>نلتزم بالمواعيد ونُنجز معظم الصيانات في نفس اليوم. وقتك يهمّنا.</p>
            </div>
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AboutPage />);
</script>
<script src="wesam-site-settings.js"></script>
</body>
</html>
