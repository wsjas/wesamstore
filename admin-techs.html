<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>الفنيون - وسام للإلكترونيات</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin-styles.css"><style>.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.tech-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px}.tech-avatar{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--orange-light),var(--orange));display:grid;place-items:center;color:var(--orange-dark);font-weight:800;font-size:20px}.save-msg{margin:0 0 16px;padding:12px 14px;border-radius:12px;font-weight:700}.save-msg.ok{background:#DCFCE7;color:#166534}.save-msg.err{background:#FEE2E2;color:#991B1B}.mini-form{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;padding:16px}@media(max-width:800px){.mini-form{grid-template-columns:1fr}}</style></head><body><div id="root"></div><script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script><script src="firebase-config.js"></script><script type="text/babel" src="admin-components.jsx"></script><script type="text/babel" src="admin-shell.jsx"></script><script type="text/babel">
const {useState,useEffect}=React;const blank={id:'',name:'',role:'فني صيانة',phone:'',skills:'شاشات LED',active:true};
function TechsPage(){const [lang,setLang]=useState('ar'),[techs,setTechs]=useState([]),[form,setForm]=useState(blank),[msg,setMsg]=useState(null);const isAr=lang==='ar',t=T[lang];const load=async()=>{try{await window.WesamFirebase.ensureCoreCollections({force:true});setTechs(await window.WesamFirebase.getCollection('technicians',{limit:200}))}catch(e){console.error(e);setMsg({type:'err',text:'تعذر تحميل الفنيين من Firebase'})}};useEffect(()=>{load()},[]);
 const save=async()=>{if(!form.name.trim()){setMsg({type:'err',text:'اسم الفني مطلوب'});return}try{const data={name:form.name,role:form.role,phone:form.phone,skills:String(form.skills).split(',').map(s=>s.trim()).filter(Boolean),active:form.active,status:form.active?'active':'inactive'};if(form.id)await window.WesamFirebase.setDoc('technicians',form.id,data,true);else await window.WesamFirebase.addDoc('technicians',data);setForm(blank);setMsg({type:'ok',text:'تم حفظ الفني في Firebase'});load()}catch(e){setMsg({type:'err',text:'فشل حفظ الفني'})}};const edit=t=>setForm({id:t.id,name:t.name||'',role:t.role||'',phone:t.phone||'',skills:Array.isArray(t.skills)?t.skills.join(', '):(t.skills||''),active:t.active!==false});const del=async(id)=>{if(!confirm('حذف الفني؟'))return;await window.WesamFirebase.deleteDoc('technicians',id);load()};
 return <AdminShell active="techs" lang={lang} setLang={setLang}><div className="page-head"><div><h1>{t.techs}</h1><div className="sub">الفنيون محفوظون في Firebase داخل technicians — {techs.length} فني</div></div><button className="btn btn-primary" onClick={save}><AICON.Plus/> {form.id?'تحديث الفني':'حفظ فني جديد'}</button></div>{msg&&<div className={`save-msg ${msg.type}`}>{msg.text}</div>}<div className="card" style={{marginBottom:20}}><div className="card-head"><h3>إضافة/تعديل فني</h3><button className="btn btn-outline btn-sm" onClick={()=>setForm(blank)}>تفريغ</button></div><div className="mini-form"><input className="form-control" placeholder="اسم الفني" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/><input className="form-control" placeholder="الدور" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}/><input className="form-control" placeholder="الهاتف" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/><input className="form-control" placeholder="المهارات مفصولة بفاصلة" value={form.skills} onChange={e=>setForm({...form,skills:e.target.value})}/><label style={{display:'flex',alignItems:'center',gap:8,fontWeight:700}}><input type="checkbox" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})}/> نشط</label></div></div><div className="tech-grid">{techs.map(t=><div key={t.id} className="tech-card"><div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}><div className="tech-avatar">{(t.name||'ف').charAt(0)}</div><div style={{flex:1}}><h3>{t.name}</h3><div style={{color:'var(--slate)'}}>{t.role}</div><div style={{fontFamily:'monospace',fontSize:12}}>{t.phone}</div></div><span className={`pill ${t.active!==false?'done':'canceled'}`}>{t.active!==false?'نشط':'موقوف'}</span></div><div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>{(Array.isArray(t.skills)?t.skills:String(t.skills||'').split(',')).map(s=><span key={s} className="pill pending">{s}</span>)}</div><div style={{display:'flex',gap:8}}><button className="btn btn-outline btn-sm" onClick={()=>edit(t)}><AICON.Edit/> تعديل</button><button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>del(t.id)}><AICON.Trash/> حذف</button></div></div>)}</div></AdminShell>}
ReactDOM.createRoot(document.getElementById('root')).render(<TechsPage/>);
</script></body></html>
