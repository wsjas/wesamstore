<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="wesam-error-logger.js"></script><title>مركز واتساب وقوالب الرسائل</title><style>
:root{--bg:#f6f8fc;--card:#fff;--text:#142033;--muted:#64748b;--line:#e5e7eb;--orange:#f97316;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--dark:#111827;--violet:#7c3aed;--shadow:0 18px 44px rgba(15,23,42,.08);--r:20px}
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#fff3e5 0,#f6f8fc 42%,#eef6ff 100%);color:var(--text)}a{text-decoration:none;color:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{max-width:1260px;margin:auto;padding:18px}.top{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:14px}.top h1{margin:0;font-size:25px}.top p{margin:6px 0 0;color:var(--muted);line-height:1.7}.actions,.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;font-weight:800;display:inline-flex;gap:7px;align-items:center;justify-content:center}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.dark{background:var(--dark);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:28px;margin-top:6px}.field{display:grid;gap:6px}.field label{font-weight:900;color:#475569;font-size:13px}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;width:100%;min-width:0}.field textarea{min-height:98px;resize:vertical}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;line-height:1.8;margin:0 0 14px}.notice.err{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.notice.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:920px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle;font-size:13px}th{background:#f8fafc;color:#475569}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.badge.gray{background:#f1f5f9;color:#334155}.mini{padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font-weight:800}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.muted{color:var(--muted)}.ok{color:#166534;font-weight:900}.bad{color:#991b1b;font-weight:900}.ltr{direction:ltr;text-align:left}.toast{position:fixed;left:18px;bottom:18px;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:99;max-width:min(520px,calc(100vw - 36px));line-height:1.6}.toast.show{display:block}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tabs button.active{background:#111827;color:#fff}.modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:80}.modal.show{display:flex}.modal-box{width:min(920px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:26px;box-shadow:0 28px 80px rgba(0,0,0,.28);padding:18px}.modal-head{display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}.modal-head h3{margin:0}.hidden{display:none!important}
@media(max-width:900px){.top{flex-direction:column}.cards,.two,.three,.form{grid-template-columns:1fr}.wrap{padding:12px}table{min-width:760px}.actions .btn{flex:1}.top h1{font-size:21px}}
@media print{.top,.toolbar,.actions,.tabs,.btn,.mini,.notice,.toast{display:none!important}body{background:#fff}.card,.table-wrap{box-shadow:none}.wrap{max-width:none;padding:0}}
</style></head>
<body>
<div class="wrap">
  <div class="top"><div><h1>مركز واتساب وقوالب الرسائل</h1><p>إرسال رسائل جاهزة للعملاء، حفظ قوالب الرد، وتسجيل المتابعات داخل Firebase.</p></div><div class="actions"><a class="btn ghost" href="admin.html">رجوع للوحة</a><button class="btn blue" id="refreshBtn">تحديث</button><a class="btn primary" href="index.html" target="_blank">فتح الموقع</a></div></div>
  <div id="msg" class="notice">جار تحميل Firebase والبيانات...</div>
  
<div class="grid cards" id="stats"></div>
<div class="grid two" style="margin-top:14px">
  <div class="card">
    <h3>إرسال رسالة واتساب</h3>
    <div class="form">
      <div class="field"><label>نوع المصدر</label><select id="sourceType"><option value="orders">طلبات البيع</option><option value="repairs">طلبات الصيانة</option><option value="customers">العملاء</option></select></div>
      <div class="field"><label>القالب</label><select id="templateSelect"></select></div>
      <div class="field full"><label>بحث</label><input id="searchBox" placeholder="اسم، هاتف، رقم طلب"></div>
      <div class="field full"><label>نص الرسالة</label><textarea id="messageText"></textarea></div>
      <div class="full actions"><button class="btn green" id="openWhatsapp">فتح واتساب</button><button class="btn blue" id="saveFollowup">حفظ متابعة</button></div>
    </div>
  </div>
  <div class="card">
    <h3>إضافة قالب رسالة</h3>
    <div class="form">
      <div class="field"><label>اسم القالب</label><input id="tplName" placeholder="مثال: تم استلام الطلب"></div>
      <div class="field"><label>النوع</label><select id="tplType"><option value="عام">عام</option><option value="بيع">بيع</option><option value="صيانة">صيانة</option><option value="متابعة">متابعة</option></select></div>
      <div class="field full"><label>النص</label><textarea id="tplText" placeholder="يمكن استخدام {name} {ref} {total} {status} {device}"></textarea></div>
      <div class="full"><button class="btn primary" id="addTpl">حفظ القالب</button></div>
    </div>
  </div>
</div>
<div class="card" style="margin-top:14px"><div class="toolbar"><button class="btn ghost" data-tab="orders">طلبات البيع</button><button class="btn ghost" data-tab="repairs">طلبات الصيانة</button><button class="btn ghost" data-tab="customers">العملاء</button></div><div id="dataTable"></div></div>

</div>
<div id="toast" class="toast"></div>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">تفاصيل</h3><button class="btn red" onclick="closeModal()">إغلاق</button></div><div id="modalBody"></div></div></div>
<script>
const $=id=>document.getElementById(id); const WF=()=>window.WesamFirebase;
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const JOD=v=>(Number(v||0)).toFixed(2)+' د.أ';
const onlyPhone=p=>String(p||'').replace(/\D/g,'').replace(/^0/,'962');
const dateText=v=>{try{const d=v&&v.toDate?v.toDate():(v?new Date(v):null);return d&&!isNaN(d)?d.toLocaleString('ar-JO'):'—'}catch(e){return '—'}};
const dateOnly=v=>{try{const d=v&&v.toDate?v.toDate():(v?new Date(v):new Date());return d&&!isNaN(d)?d.toISOString().slice(0,10):''}catch(e){return ''}};
function toast(m,ok=true){const t=$('toast'); t.textContent=m; t.style.background=ok?'#111827':'#991b1b'; t.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),4200)}
function setMsg(m,cls='notice'){const el=$('msg'); el.className=cls; el.textContent=m}
function table(headers, rows, empty='لا توجد بيانات'){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="muted" style="text-align:center;padding:24px">${empty}</td></tr>`}</tbody></table></div>`}
window.closeModal=()=>{$('modal').classList.remove('show');$('modalBody').innerHTML=''};
function openModal(title,html){$('modalTitle').textContent=title;$('modalBody').innerHTML=html;$('modal').classList.add('show')}
async function safe(label,fn,fb=[]){try{return await fn()}catch(e){console.warn(label,e); toast('تعذر تحميل '+label+': '+(e.message||e),false); return fb}}

let orders=[],repairs=[],customers=[],templates=[],selected=null,currentTab='orders',settings={};
const defaults=[
 {id:'d1',name:'تأكيد طلب بيع',type:'بيع',text:'مرحبًا {name}، تم استلام طلبك رقم {ref} بقيمة {total}. سنقوم بالتواصل معك قريبًا. وسام للإلكترونيات'},
 {id:'d2',name:'استلام طلب صيانة',type:'صيانة',text:'مرحبًا {name}، تم استلام طلب الصيانة رقم {ref} لجهاز {device}. الحالة الحالية: {status}.'},
 {id:'d3',name:'جاهز للتسليم',type:'صيانة',text:'مرحبًا {name}، جهازك في طلب الصيانة رقم {ref} جاهز للتسليم. شكرًا لاختيارك وسام للإلكترونيات.'},
 {id:'d4',name:'متابعة عميل',type:'متابعة',text:'مرحبًا {name}، نتابع معك بخصوص طلبك رقم {ref}. هل تحتاج أي مساعدة إضافية؟'}
];
function amount(o){return Number(o.total??o.finalTotal??o.amount??o.repairCost??o.cost??0)}
function normalizeCustomers(){const map=new Map(); function add(name,phone,src,total){phone=String(phone||''); if(!phone) return; const k=onlyPhone(phone); const old=map.get(k)||{name:name||'عميل',phone,src:[],count:0,total:0}; old.name=old.name||name; old.src.push(src); old.count++; old.total+=Number(total||0); map.set(k,old)} orders.forEach(o=>add(o.customerName||o.name,o.phone||o.customerPhone,'بيع',amount(o))); repairs.forEach(r=>add(r.customerName||r.name,r.phone||r.customerPhone,'صيانة',amount(r))); customers.forEach(c=>add(c.name||c.customerName,c.phone||c.customerPhone,'يدوي',0)); return [...map.values()].map((x,i)=>({...x,id:'c'+i,src:[...new Set(x.src)].join('، ')}))}
function getRows(){const q=($('searchBox').value||'').toLowerCase(); const list=currentTab==='orders'?orders:(currentTab==='repairs'?repairs:normalizeCustomers()); return list.filter(x=>!q||JSON.stringify(x).toLowerCase().includes(q))}
function rowData(x){if(currentTab==='orders') return {name:x.customerName||x.name||'',phone:x.phone||x.customerPhone||'',ref:x.orderId||x.id,total:JOD(amount(x)),status:x.status||'new',device:''}; if(currentTab==='repairs') return {name:x.customerName||x.name||'',phone:x.phone||x.customerPhone||'',ref:x.requestId||x.id,total:JOD(amount(x)),status:x.status||'new',device:x.deviceType||x.device||''}; return {name:x.name||'',phone:x.phone||'',ref:x.id||'',total:JOD(x.total||0),status:x.src||'',device:''};}
function applyTemplate(tpl,row){return String(tpl.text||'').replaceAll('{name}',row.name||'عميلنا الكريم').replaceAll('{phone}',row.phone||'').replaceAll('{ref}',row.ref||'').replaceAll('{total}',row.total||'').replaceAll('{status}',row.status||'').replaceAll('{device}',row.device||'')}
function render(){
 $('stats').innerHTML=`<div class="card stat"><span>طلبات بيع</span><b>${orders.length}</b></div><div class="card stat"><span>طلبات صيانة</span><b>${repairs.length}</b></div><div class="card stat"><span>عملاء</span><b>${normalizeCustomers().length}</b></div><div class="card stat"><span>قوالب</span><b>${templates.length+defaults.length}</b></div>`;
 const allTpl=[...defaults,...templates]; $('templateSelect').innerHTML=allTpl.map(t=>`<option value="${esc(t.id)}">${esc(t.name)} - ${esc(t.type||'')}</option>`).join('');
 const rows=getRows(); $('dataTable').innerHTML=table(['الاسم','الهاتف','المرجع','الحالة/المصدر','المبلغ','إجراءات'], rows.map(x=>{const r=rowData(x);return `<tr><td><b>${esc(r.name)}</b></td><td class="ltr">${esc(r.phone)}</td><td>${esc(r.ref)}</td><td>${esc(r.status)}</td><td>${esc(r.total)}</td><td><button class="mini blue" onclick="pick('${esc(r.phone)}','${esc(r.ref)}')">اختيار</button> <a class="mini green" target="_blank" href="https://wa.me/${onlyPhone(r.phone)}">واتساب سريع</a></td></tr>`}));
}
window.pick=(phone,ref)=>{const rows=getRows(); const found=rows.find(x=>{const r=rowData(x); return String(r.phone)===String(phone)&&String(r.ref)===String(ref)}); selected=found; const r=rowData(found||{}); const tpl=[...defaults,...templates].find(t=>t.id===$('templateSelect').value)||defaults[0]; $('messageText').value=applyTemplate(tpl,r); toast('تم اختيار العميل')}
async function load(){ if(!WF()||!WF().db) throw new Error('Firebase غير مهيأ'); settings=await safe('settings',()=>WF().loadSettings(),{}); orders=await safe('orders',()=>WF().getCollection('orders',{limit:1200}),[]); repairs=await safe('service_requests',()=>WF().getCollection('service_requests',{limit:1200}),[]); customers=await safe('customers',()=>WF().getCollection('customers',{limit:900}),[]); templates=await safe('message_templates',()=>WF().getCollection('message_templates',{limit:400}),[]); setMsg('تم تحميل مركز واتساب من Firebase. المشروع: '+WF().projectId,'notice ok'); render(); }
$('refreshBtn').onclick=load; $('searchBox').oninput=render; document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;$('sourceType').value=currentTab==='repairs'?'repairs':currentTab;render()}); $('sourceType').onchange=e=>{currentTab=e.target.value;render()}; $('templateSelect').onchange=()=>{if(selected) pick(rowData(selected).phone,rowData(selected).ref)};
$('openWhatsapp').onclick=()=>{const r=selected?rowData(selected):{phone:''}; const text=$('messageText').value.trim(); if(!r.phone||!text) return toast('اختر عميلًا واكتب الرسالة أولًا',false); window.open('https://wa.me/'+onlyPhone(r.phone)+'?text='+encodeURIComponent(text),'_blank')};
$('saveFollowup').onclick=async()=>{if(!selected) return toast('اختر عميلًا أولًا',false); const r=rowData(selected); await WF().addDoc('followups',{customerName:r.name,phone:r.phone,source:currentTab,reference:r.ref,note:$('messageText').value,status:'pending',dueDate:new Date().toISOString().slice(0,10)}); toast('تم حفظ المتابعة');};
$('addTpl').onclick=async()=>{const name=$('tplName').value.trim(), text=$('tplText').value.trim(); if(!name||!text) return toast('اكتب اسم القالب والنص',false); await WF().addDoc('message_templates',{name,type:$('tplType').value,text,active:true}); $('tplName').value='';$('tplText').value=''; await load(); toast('تم حفظ القالب')};
load().catch(e=>{console.error(e);setMsg('خطأ: '+(e.message||e),'notice err')});
</script>
</body></html>
