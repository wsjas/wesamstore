<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقارير - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
<style>
.donut-wrap { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 20px; }
.donut-legend { display: flex; flex-direction: column; gap: 12px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.legend-item .swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-item .v { margin-right: auto; font-weight: 700; color: var(--navy); }
.line-chart { height: 220px; padding: 16px; position: relative; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="admin-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

function ReportsPage() {
  const [lang, setLang] = useState('ar');
  const [period, setPeriod] = useState('month');
  const isAr = lang === 'ar';
  const t = T[lang];

  // Donut: revenue breakdown by category
  const breakdown = [
    { label: isAr ? 'صيانة شاشات' : 'TV Repair', value: 45, color: '#F97316' },
    { label: isAr ? 'صيانة أجهزة منزلية' : 'Appliance Repair', value: 22, color: '#3B82F6' },
    { label: isAr ? 'مبيعات الريموتات' : 'Remotes', value: 14, color: '#10B981' },
    { label: isAr ? 'حاملات وكابلات' : 'Mounts & Cables', value: 12, color: '#8B5CF6' },
    { label: isAr ? 'رسيفر' : 'Receivers', value: 7, color: '#F59E0B' },
  ];

  let cumulative = 0;
  const total = breakdown.reduce((s,b) => s+b.value, 0);
  const donutSegments = breakdown.map(b => {
    const start = (cumulative / total) * 360;
    cumulative += b.value;
    const end = (cumulative / total) * 360;
    return { ...b, start, end };
  });

  // Line chart points (12 months)
  const months = isAr ? ['ي','ف','م','أ','م','ي','ي','أ','س','أ','ن','د'] : ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const values = [3200, 2800, 4100, 3800, 5200, 4600, 5800, 6100, 5400, 6800, 7200, 4820];
  const maxV = Math.max(...values);
  const points = values.map((v, i) => ({
    x: (i / (values.length - 1)) * 100,
    y: 100 - (v / maxV) * 90,
    v,
  }));
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const areaPath = `${linePath} L 100 100 L 0 100 Z`;

  const topProducts = [
    { rank: 1, name: 'كابل HDMI 4K 1.5 متر', sold: 412, rev: 1648 },
    { rank: 2, name: 'كابل HDMI 4K 3 متر', sold: 287, rev: 1722 },
    { rank: 3, name: 'ريموت Samsung Smart TV', sold: 234, rev: 2808 },
    { rank: 4, name: 'ريموت LG Smart TV', sold: 189, rev: 2079 },
    { rank: 5, name: 'حامل شاشة ثابت', sold: 156, rev: 2340 },
  ];

  return (
    <AdminShell active="reports" lang={lang} setLang={setLang}>
      <div className="page-head">
        <div>
          <h1>{t.reports}</h1>
          <div className="sub">{isAr ? 'تحليلات مفصّلة لأداء المتجر والصيانة' : 'Detailed analytics for shop and service'}</div>
        </div>
        <div className="page-head-actions">
          <div className="tab-pills">
            <button className={`tab-pill ${period === 'week' ? 'active' : ''}`} onClick={() => setPeriod('week')}>{isAr ? 'أسبوع' : 'Week'}</button>
            <button className={`tab-pill ${period === 'month' ? 'active' : ''}`} onClick={() => setPeriod('month')}>{isAr ? 'شهر' : 'Month'}</button>
            <button className={`tab-pill ${period === 'year' ? 'active' : ''}`} onClick={() => setPeriod('year')}>{isAr ? 'سنة' : 'Year'}</button>
          </div>
          <button className="btn btn-outline"><AICON.Download /> {isAr ? 'تصدير PDF' : 'Export PDF'}</button>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Chart /></div><span className="trend up"><AICON.ArrowUp /> 24%</span></div><div className="num">61,820 د.أ</div><div className="label">{isAr ? 'إجمالي الإيرادات' : 'Total Revenue'}</div></div>
        <div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Wrench /></div><span className="trend up"><AICON.ArrowUp /> 12%</span></div><div className="num">524</div><div className="label">{isAr ? 'صيانات منجزة' : 'Repairs Completed'}</div></div>
        <div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Cart /></div><span className="trend up"><AICON.ArrowUp /> 18%</span></div><div className="num">1,247</div><div className="label">{isAr ? 'طلبات متجر' : 'Shop Orders'}</div></div>
        <div className="kpi purple"><div className="kpi-head"><div className="ico"><AICON.Users /></div><span className="trend up"><AICON.ArrowUp /> 9%</span></div><div className="num">38</div><div className="label">{isAr ? 'عملاء جدد' : 'New Customers'}</div></div>
      </div>

      <div className="grid-2" style={{marginBottom: 20}}>
        <div className="card">
          <div className="card-head">
            <h3>{isAr ? 'تطور الإيرادات' : 'Revenue Trend'}</h3>
            <div className="sub">{isAr ? 'آخر ١٢ شهر' : 'Last 12 months'}</div>
          </div>
          <div className="line-chart">
            <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
              <defs>
                <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#F97316" stopOpacity="0.3"/>
                  <stop offset="100%" stopColor="#F97316" stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d={areaPath} fill="url(#areaGrad)" />
              <path d={linePath} stroke="#F97316" strokeWidth="0.8" fill="none" vectorEffect="non-scaling-stroke" />
              {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="0.8" fill="#F97316" vectorEffect="non-scaling-stroke" />)}
            </svg>
            <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--slate)', marginTop: 8}}>
              {months.map((m, i) => <span key={i}>{m}</span>)}
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-head"><h3>{isAr ? 'توزيع الإيرادات' : 'Revenue Breakdown'}</h3></div>
          <div className="donut-wrap">
            <svg width="160" height="160" viewBox="-50 -50 100 100">
              {donutSegments.map((s, i) => {
                const startRad = (s.start - 90) * Math.PI / 180;
                const endRad = (s.end - 90) * Math.PI / 180;
                const r = 40, ir = 26;
                const x1 = r * Math.cos(startRad), y1 = r * Math.sin(startRad);
                const x2 = r * Math.cos(endRad), y2 = r * Math.sin(endRad);
                const x3 = ir * Math.cos(endRad), y3 = ir * Math.sin(endRad);
                const x4 = ir * Math.cos(startRad), y4 = ir * Math.sin(startRad);
                const large = s.end - s.start > 180 ? 1 : 0;
                return <path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${ir} ${ir} 0 ${large} 0 ${x4} ${y4} Z`} fill={s.color} />;
              })}
              <text x="0" y="-2" textAnchor="middle" fontSize="9" fontWeight="800" fill="#0F172A">100%</text>
              <text x="0" y="6" textAnchor="middle" fontSize="4" fill="#64748B">{isAr ? 'الإجمالي' : 'Total'}</text>
            </svg>
            <div className="donut-legend" style={{flex: 1}}>
              {breakdown.map((b, i) => (
                <div key={i} className="legend-item">
                  <span className="swatch" style={{background: b.color}}></span>
                  <span>{b.label}</span>
                  <span className="v">{b.value}%</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <h3>{isAr ? 'أفضل المنتجات مبيعاً' : 'Top Selling Products'}</h3>
          <div className="sub">{isAr ? 'هذا الشهر' : 'This month'}</div>
        </div>
        <div className="table-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>#</th>
                <th>{isAr ? 'المنتج' : 'Product'}</th>
                <th>{isAr ? 'الكمية المباعة' : 'Units Sold'}</th>
                <th>{isAr ? 'الإيراد' : 'Revenue'}</th>
                <th>{isAr ? 'النمو' : 'Growth'}</th>
              </tr>
            </thead>
            <tbody>
              {topProducts.map(p => (
                <tr key={p.rank}>
                  <td><div style={{width: 28, height: 28, borderRadius: 8, background: p.rank <= 3 ? 'var(--orange-light)' : 'var(--bg)', color: p.rank <= 3 ? 'var(--orange-dark)' : 'var(--slate)', fontWeight: 800, display: 'grid', placeItems: 'center'}}>{p.rank}</div></td>
                  <td style={{fontWeight: 600}}>{p.name}</td>
                  <td>{p.sold}</td>
                  <td style={{fontWeight: 700, color: 'var(--orange-dark)'}}>{p.rev} د.أ</td>
                  <td><span className="trend up" style={{display: 'inline-flex', alignItems: 'center', gap: 3, background: 'var(--green-bg)', color: 'var(--green)', padding: '3px 8px', borderRadius: 6, fontSize: 12, fontWeight: 700}}><AICON.ArrowUp /> {Math.floor(Math.random() * 30 + 5)}%</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </AdminShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ReportsPage />);
</script>
</body>
</html>
