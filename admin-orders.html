<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات المتجر - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="admin-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const INITIAL_ORDERS = [];

function OrdersPage() {
  const [lang, setLang] = useState('ar');
  const [filter, setFilter] = useState('all');
  const [orders, setOrders] = useState(INITIAL_ORDERS);
  useEffect(() => {
    window.WesamFirebase.getCollection('orders', { limit: 200 }).then(rows => {
      setOrders(rows.map(o => ({
        id: o.orderId || o.id,
        customer: o.customerName || o.name || o.customer?.name || 'عميل',
        initial: (o.customerName || o.name || 'ع').trim().charAt(0),
        items: Array.isArray(o.items) ? o.items.length : Number(o.itemsCount || 0),
        products: Array.isArray(o.items) ? o.items.map(i => i.name).join('، ') : (o.products || ''),
        total: Number(o.total || 0),
        status: o.status || 'pending',
        date: o.createdAt?.toDate ? o.createdAt.toDate().toISOString().slice(0,10) : (o.date || ''),
        payment: o.payment || o.paymentMethod || 'غير محدد'
      })));
    }).catch(console.error);
  }, []);
  const isAr = lang === 'ar';
  const t = T[lang];

  const filtered = orders.filter(o => filter === 'all' || o.status === filter);
  const counts = { all: orders.length };
  ['pending','shipped','done','cancelled'].forEach(s => counts[s] = orders.filter(o => o.status === s).length);

  const totalRev = orders.filter(o => o.status !== 'cancelled').reduce((s,o) => s+o.total, 0);

  return (
    <AdminShell active="orders" lang={lang} setLang={setLang}>
      <div className="page-head">
        <div>
          <h1>{t.orders}</h1>
          <div className="sub">{isAr ? `إجمالي ${orders.length} طلب • ${totalRev} د.أ` : `${orders.length} orders • ${totalRev} JOD`}</div>
        </div>
        <div className="page-head-actions">
          <button className="btn btn-outline" onClick={() => window.print()}><AICON.Download /> {t.export}</button>
          <a className="btn btn-primary" href="checkout.html"><AICON.Plus /> {isAr ? 'طلب جديد' : 'New Order'}</a>
        </div>
      </div>

      <div className="filter-bar">
        <div className="tab-pills">
          {[['all', isAr ? 'الكل' : 'All'], ['pending', isAr ? 'بانتظار' : 'Pending'], ['shipped', isAr ? 'مُرسلة' : 'Shipped'], ['done', isAr ? 'مكتملة' : 'Done'], ['cancelled', isAr ? 'ملغاة' : 'Cancelled']].map(([k, l]) => (
            <button key={k} className={`tab-pill ${filter === k ? 'active' : ''}`} onClick={() => setFilter(k)}>{l} ({counts[k]})</button>
          ))}
        </div>
        <input type="text" placeholder={isAr ? 'بحث برقم الطلب أو العميل...' : 'Search...'} style={{flex: 1, minWidth: 180}} />
      </div>

      <div className="card">
        <div className="table-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>{isAr ? 'رقم الطلب' : 'Order #'}</th>
                <th>{isAr ? 'العميل' : 'Customer'}</th>
                <th>{isAr ? 'المنتجات' : 'Products'}</th>
                <th>{isAr ? 'القطع' : 'Items'}</th>
                <th>{isAr ? 'الدفع' : 'Payment'}</th>
                <th>{isAr ? 'الحالة' : 'Status'}</th>
                <th>{isAr ? 'التاريخ' : 'Date'}</th>
                <th>{isAr ? 'المجموع' : 'Total'}</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(o => (
                <tr key={o.id}>
                  <td style={{fontWeight: 700, color: 'var(--orange-dark)'}}>{o.id}</td>
                  <td>
                    <div className="av-row">
                      <div className="av">{o.initial}</div>
                      <div className="name">{o.customer}</div>
                    </div>
                  </td>
                  <td style={{color: 'var(--slate)', maxWidth: 220, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{o.products}</td>
                  <td>{o.items}</td>
                  <td style={{fontSize: 12, color: 'var(--slate)'}}>{o.payment}</td>
                  <td><span className={`pill ${o.status}`}>{isAr ? ({pending:'بانتظار',shipped:'مُرسل',done:'مكتمل',cancelled:'ملغي'})[o.status] : o.status}</span></td>
                  <td style={{color: 'var(--slate)', fontSize: 12}}>{o.date}</td>
                  <td style={{fontWeight: 700}}>{o.total} د.أ</td>
                  <td>
                    <div className="row-actions">
                      <button className="action-btn"><AICON.Eye /></button>
                      <button className="action-btn"><AICON.Print /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </AdminShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OrdersPage />);
</script>
</body>
</html>
