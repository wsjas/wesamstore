<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العروض - وسام للإلكترونيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
<style>
.offer-mgr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.offer-mgr-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; }
.offer-mgr-card.active { border-color: var(--orange); }
.offer-mgr-card .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.offer-mgr-card h3 { font-size: 16px; font-weight: 800; margin-bottom: 6px; line-height: 1.4; }
.offer-mgr-card p { color: var(--slate); font-size: 13px; line-height: 1.6; margin-bottom: 14px; }
.toggle { position: relative; width: 38px; height: 22px; background: var(--border); border-radius: 999px; cursor: pointer; transition: all .2s; }
.toggle.on { background: var(--green); }
.toggle::after { content: ""; position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: all .2s; }
.toggle.on::after { right: auto; left: 2px; }
.discount-pill { background: linear-gradient(135deg, var(--orange), var(--orange-dark)); color: #fff; padding: 6px 14px; border-radius: 8px; font-weight: 800; }
.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border-light); font-size: 13px; }
.stat-row span:first-child { color: var(--slate); }
.stat-row span:last-child { font-weight: 700; color: var(--navy); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script type="text/babel" src="admin-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>

<script type="text/babel">
const { useState } = React;

function OffersPage() {
  const [lang, setLang] = useState('ar');
  const [offers, setOffers] = useState([
    { id: 1, title: 'عرض دائم على الصيانة', desc: 'خصم على كل طلبات الصيانة من الموقع', discount: '15٪', code: 'WESAM-MAINT', uses: 142, revenue: 2840, active: true },
    { id: 2, title: 'كشف مجاني عند الإصلاح', desc: 'مجاناً لكل صيانات شاشات LED', discount: 'مجاناً', code: 'FREE-CHECK', uses: 89, revenue: 0, active: true },
    { id: 3, title: 'خصم على الريموتات', desc: 'خصم على كل الريموتات الأصلية', discount: '٣٠٪', code: 'REMOTE30', uses: 67, revenue: 1240, active: true },
    { id: 4, title: 'تركيب مجاني للحاملات', desc: 'تركيب مجاني داخل عمّان', discount: 'مجاناً', code: 'INSTALL', uses: 34, revenue: 0, active: true },
    { id: 5, title: 'اشترِ ٢ واحصل على ١', desc: 'على كابلات HDMI و USB', discount: '+١', code: 'BUY2GET1', uses: 28, revenue: 380, active: false },
    { id: 6, title: 'IPTV سنوي', desc: 'سعر خاص للاشتراك السنوي', discount: '25 د.أ', code: 'IPTV-YEAR', uses: 15, revenue: 375, active: true },
  ]);
  const isAr = lang === 'ar';
  const t = T[lang];

  const toggle = (id) => setOffers(os => os.map(o => o.id === id ? {...o, active: !o.active} : o));
  const totalRev = offers.reduce((s,o) => s+o.revenue, 0);
  const totalUses = offers.reduce((s,o) => s+o.uses, 0);

  return (
    <AdminShell active="offers" lang={lang} setLang={setLang}>
      <div className="page-head">
        <div>
          <h1>{t.offers}</h1>
          <div className="sub">{isAr ? 'إدارة العروض الدائمة وأكواد الخصم' : 'Manage offers and discount codes'}</div>
        </div>
        <div className="page-head-actions">
          <button className="btn btn-primary"><AICON.Plus /> {isAr ? 'عرض جديد' : 'New Offer'}</button>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Tag /></div></div><div className="num">{offers.filter(o => o.active).length}</div><div className="label">{isAr ? 'عروض نشطة' : 'Active Offers'}</div></div>
        <div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Users /></div></div><div className="num">{totalUses}</div><div className="label">{isAr ? 'مرات الاستخدام' : 'Total Redemptions'}</div></div>
        <div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Chart /></div></div><div className="num">{totalRev} د.أ</div><div className="label">{isAr ? 'إيرادات بالعروض' : 'Revenue from Offers'}</div></div>
        <div className="kpi purple"><div className="kpi-head"><div className="ico"><AICON.Tag /></div></div><div className="num">{offers.length}</div><div className="label">{isAr ? 'إجمالي العروض' : 'Total Offers'}</div></div>
      </div>

      <div className="offer-mgr-grid">
        {offers.map(o => (
          <div key={o.id} className={`offer-mgr-card ${o.active ? 'active' : ''}`}>
            <div className="top-row">
              <div className="discount-pill">{o.discount}</div>
              <div className="toggle" data-on={o.active} className={`toggle ${o.active ? 'on' : ''}`} onClick={() => toggle(o.id)}></div>
            </div>
            <h3>{o.title}</h3>
            <p>{o.desc}</p>
            <div style={{padding: '8px 12px', background: 'var(--bg)', borderRadius: 8, fontFamily: 'monospace', fontSize: 13, fontWeight: 700, color: 'var(--orange-dark)', marginBottom: 12, textAlign: 'center', letterSpacing: 1}}>{o.code}</div>
            <div className="stat-row"><span>{isAr ? 'مرات الاستخدام' : 'Uses'}</span><span>{o.uses}</span></div>
            <div className="stat-row"><span>{isAr ? 'الإيرادات' : 'Revenue'}</span><span>{o.revenue} د.أ</span></div>
            <div className="stat-row" style={{borderBottom: '1px solid var(--border-light)', borderTop: '1px solid var(--border-light)', marginTop: 8}}>
              <button className="btn btn-ghost btn-sm" style={{padding: 4}}><AICON.Edit /> {isAr ? 'تعديل' : 'Edit'}</button>
              <button className="btn btn-ghost btn-sm" style={{padding: 4, color: 'var(--red)'}}><AICON.Trash /></button>
            </div>
          </div>
        ))}
      </div>
    </AdminShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OffersPage />);
</script>
</body>
</html>
