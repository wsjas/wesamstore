<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>العروض - وسام للإلكترونيات</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin-styles.css"><style>.offer-mgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}.offer-mgr-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px}.offer-mgr-card.active{border-color:var(--orange)}.discount-pill{background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;padding:6px 14px;border-radius:8px;font-weight:800}.save-msg{margin:0 0 16px;padding:12px 14px;border-radius:12px;font-weight:700}.save-msg.ok{background:#DCFCE7;color:#166534}.save-msg.err{background:#FEE2E2;color:#991B1B}.mini-form{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;padding:16px}@media(max-width:900px){.mini-form{grid-template-columns:1fr 1fr}}@media(max-width:600px){.mini-form{grid-template-columns:1fr}}</style></head><body><div id="root"></div><script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script><script src="firebase-config.js"></script><script type="text/babel" src="admin-components.jsx"></script><script type="text/babel" src="admin-shell.jsx"></script><script type="text/babel">
const {useState,useEffect}=React;const blank={id:'',title:'',desc:'',discount:'',code:'',active:true,uses:0,revenue:0};
function OffersPage(){const [lang,setLang]=useState('ar'),[offers,setOffers]=useState([]),[form,setForm]=useState(blank),[msg,setMsg]=useState(null),[saving,setSaving]=useState(false);const isAr=lang==='ar',t=T[lang];
 const load=async()=>{try{await window.WesamFirebase.ensureCoreCollections({force:true});setOffers(await window.WesamFirebase.getCollection('coupons',{limit:300}))}catch(e){console.error(e);setMsg({type:'err',text:'تعذر تحميل العروض من Firebase'})}};useEffect(()=>{load()},[]);
 const save=async()=>{if(!form.title.trim()&&!form.code.trim()){setMsg({type:'err',text:'أدخل اسم العرض أو الكود'});return}setSaving(true);try{const data={title:form.title,desc:form.desc,discount:form.discount,code:form.code,active:form.active,uses:Number(form.uses)||0,revenue:Number(form.revenue)||0};if(form.id)await window.WesamFirebase.setDoc('coupons',form.id,data,true);else await window.WesamFirebase.addDoc('coupons',data);setForm(blank);setMsg({type:'ok',text:'تم حفظ العرض في Firebase'});load()}catch(e){console.error(e);setMsg({type:'err',text:'فشل حفظ العرض. راجع القواعد'})}finally{setSaving(false)}};
 const edit=o=>setForm({id:o.id,title:o.title||'',desc:o.desc||o.description||'',discount:o.discount||'',code:o.code||'',active:o.active!==false,uses:o.uses||0,revenue:o.revenue||0});const del=async(id)=>{if(!confirm('حذف العرض؟'))return;await window.WesamFirebase.deleteDoc('coupons',id);load()};const toggle=async(o)=>{await window.WesamFirebase.setDoc('coupons',o.id,{active:!(o.active!==false)},true);load()};const totalRev=offers.reduce((s,o)=>s+(Number(o.revenue)||0),0),totalUses=offers.reduce((s,o)=>s+(Number(o.uses)||0),0);
 return <AdminShell active="offers" lang={lang} setLang={setLang}><div className="page-head"><div><h1>{t.offers}</h1><div className="sub">العروض محفوظة في Firebase داخل coupons — {window.WesamFirebase.projectId}</div></div><button className="btn btn-primary" onClick={save} disabled={saving}><AICON.Plus/> {saving?'جاري الحفظ...':form.id?'تحديث العرض':'حفظ عرض جديد'}</button></div>{msg&&<div className={`save-msg ${msg.type}`}>{msg.text}</div>}<div className="kpi-grid"><div className="kpi orange"><div className="kpi-head"><div className="ico"><AICON.Tag/></div></div><div className="num">{offers.filter(o=>o.active!==false).length}</div><div className="label">عروض نشطة</div></div><div className="kpi blue"><div className="kpi-head"><div className="ico"><AICON.Users/></div></div><div className="num">{totalUses}</div><div className="label">مرات الاستخدام</div></div><div className="kpi green"><div className="kpi-head"><div className="ico"><AICON.Chart/></div></div><div className="num">{totalRev} د.أ</div><div className="label">إيرادات بالعروض</div></div><div className="kpi purple"><div className="kpi-head"><div className="ico"><AICON.Tag/></div></div><div className="num">{offers.length}</div><div className="label">إجمالي العروض</div></div></div><div className="card" style={{marginBottom:20}}><div className="card-head"><h3>{form.id?'تعديل عرض':'إضافة عرض'}</h3><button className="btn btn-outline btn-sm" onClick={()=>setForm(blank)}>تفريغ</button></div><div className="mini-form"><input className="form-control" placeholder="عنوان العرض" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/><input className="form-control" placeholder="الكود" value={form.code} onChange={e=>setForm({...form,code:e.target.value})}/><input className="form-control" placeholder="قيمة الخصم" value={form.discount} onChange={e=>setForm({...form,discount:e.target.value})}/><input className="form-control" type="number" placeholder="الاستخدامات" value={form.uses} onChange={e=>setForm({...form,uses:e.target.value})}/><input className="form-control" type="number" placeholder="الإيرادات" value={form.revenue} onChange={e=>setForm({...form,revenue:e.target.value})}/><label style={{display:'flex',alignItems:'center',gap:8,fontWeight:700}}><input type="checkbox" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})}/> نشط</label><input className="form-control" style={{gridColumn:'1/-1'}} placeholder="الوصف" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div></div><div className="offer-mgr-grid">{offers.map(o=><div key={o.id} className={`offer-mgr-card ${o.active!==false?'active':''}`}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div className="discount-pill">{o.discount||'عرض'}</div><span className={`pill ${o.active!==false?'done':'canceled'}`}>{o.active!==false?'نشط':'موقوف'}</span></div><h3>{o.title||o.code}</h3><p style={{color:'var(--slate)',lineHeight:1.7}}>{o.desc||o.description||''}</p><div style={{padding:'8px 12px',background:'var(--bg)',borderRadius:8,fontFamily:'monospace',fontWeight:700,color:'var(--orange-dark)',textAlign:'center'}}>{o.code}</div><div style={{display:'flex',gap:8,marginTop:12}}><button className="btn btn-outline btn-sm" onClick={()=>toggle(o)}>تشغيل/إيقاف</button><button className="btn btn-outline btn-sm" onClick={()=>edit(o)}><AICON.Edit/> تعديل</button><button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>del(o.id)}><AICON.Trash/></button></div></div>)}</div></AdminShell>}
ReactDOM.createRoot(document.getElementById('root')).render(<OffersPage/>);
</script></body></html>
