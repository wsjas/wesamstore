<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="wesam-error-logger.js"></script><title>مركز المتابعات</title><style>
:root{--bg:#f6f8fc;--card:#fff;--text:#142033;--muted:#64748b;--line:#e5e7eb;--orange:#f97316;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--dark:#111827;--violet:#7c3aed;--shadow:0 18px 44px rgba(15,23,42,.08);--r:20px}
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#fff3e5 0,#f6f8fc 42%,#eef6ff 100%);color:var(--text)}a{text-decoration:none;color:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{max-width:1260px;margin:auto;padding:18px}.top{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:14px}.top h1{margin:0;font-size:25px}.top p{margin:6px 0 0;color:var(--muted);line-height:1.7}.actions,.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;font-weight:800;display:inline-flex;gap:7px;align-items:center;justify-content:center}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.dark{background:var(--dark);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:28px;margin-top:6px}.field{display:grid;gap:6px}.field label{font-weight:900;color:#475569;font-size:13px}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;width:100%;min-width:0}.field textarea{min-height:98px;resize:vertical}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;line-height:1.8;margin:0 0 14px}.notice.err{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.notice.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:920px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle;font-size:13px}th{background:#f8fafc;color:#475569}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.badge.gray{background:#f1f5f9;color:#334155}.mini{padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font-weight:800}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.muted{color:var(--muted)}.ok{color:#166534;font-weight:900}.bad{color:#991b1b;font-weight:900}.ltr{direction:ltr;text-align:left}.toast{position:fixed;left:18px;bottom:18px;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:99;max-width:min(520px,calc(100vw - 36px));line-height:1.6}.toast.show{display:block}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tabs button.active{background:#111827;color:#fff}.modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:80}.modal.show{display:flex}.modal-box{width:min(920px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:26px;box-shadow:0 28px 80px rgba(0,0,0,.28);padding:18px}.modal-head{display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}.modal-head h3{margin:0}.hidden{display:none!important}
@media(max-width:900px){.top{flex-direction:column}.cards,.two,.three,.form{grid-template-columns:1fr}.wrap{padding:12px}table{min-width:760px}.actions .btn{flex:1}.top h1{font-size:21px}}
@media print{.top,.toolbar,.actions,.tabs,.btn,.mini,.notice,.toast{display:none!important}body{background:#fff}.card,.table-wrap{box-shadow:none}.wrap{max-width:none;padding:0}}
</style></head>
<body>
<div class="wrap">
  <div class="top"><div><h1>مركز المتابعات</h1><p>جدولة متابعة العملاء، كشف المتأخر، وإنهاء المتابعة أو إرسال واتساب مباشر.</p></div><div class="actions"><a class="btn ghost" href="admin.html">رجوع للوحة</a><button class="btn blue" id="refreshBtn">تحديث</button><a class="btn primary" href="index.html" target="_blank">فتح الموقع</a></div></div>
  <div id="msg" class="notice">جار تحميل Firebase والبيانات...</div>
  
<div class="grid cards" id="stats"></div>
<div class="card" style="margin-top:14px">
  <h3>إضافة متابعة</h3>
  <div class="form">
    <div class="field"><label>اسم العميل</label><input id="name"></div>
    <div class="field"><label>الهاتف</label><input id="phone"></div>
    <div class="field"><label>تاريخ المتابعة</label><input id="dueDate" type="date"></div>
    <div class="field"><label>المصدر</label><select id="source"><option>يدوي</option><option>طلب بيع</option><option>صيانة</option><option>ضمان</option></select></div>
    <div class="field full"><label>الملاحظة</label><textarea id="note"></textarea></div>
    <div class="full actions"><button class="btn primary" id="addFollow">حفظ المتابعة</button><button class="btn blue" id="exportCsv">تصدير CSV</button></div>
  </div>
</div>
<div class="card" style="margin-top:14px"><div class="toolbar"><input id="q" class="field" style="padding:11px;border:1px solid #e5e7eb;border-radius:14px;min-width:260px" placeholder="بحث"><select id="statusFilter" class="field" style="padding:11px;border:1px solid #e5e7eb;border-radius:14px"><option value="all">كل الحالات</option><option value="pending">بانتظار</option><option value="done">منتهية</option><option value="late">متأخرة</option></select></div><div id="rows"></div></div>

</div>
<div id="toast" class="toast"></div>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">تفاصيل</h3><button class="btn red" onclick="closeModal()">إغلاق</button></div><div id="modalBody"></div></div></div>
<script>
const $=id=>document.getElementById(id); const WF=()=>window.WesamFirebase;
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const JOD=v=>(Number(v||0)).toFixed(2)+' د.أ';
const onlyPhone=p=>String(p||'').replace(/\D/g,'').replace(/^0/,'962');
const dateText=v=>{try{const d=v&&v.toDate?v.toDate():(v?new Date(v):null);return d&&!isNaN(d)?d.toLocaleString('ar-JO'):'—'}catch(e){return '—'}};
const dateOnly=v=>{try{const d=v&&v.toDate?v.toDate():(v?new Date(v):new Date());return d&&!isNaN(d)?d.toISOString().slice(0,10):''}catch(e){return ''}};
function toast(m,ok=true){const t=$('toast'); t.textContent=m; t.style.background=ok?'#111827':'#991b1b'; t.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),4200)}
function setMsg(m,cls='notice'){const el=$('msg'); el.className=cls; el.textContent=m}
function table(headers, rows, empty='لا توجد بيانات'){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="muted" style="text-align:center;padding:24px">${empty}</td></tr>`}</tbody></table></div>`}
window.closeModal=()=>{$('modal').classList.remove('show');$('modalBody').innerHTML=''};
function openModal(title,html){$('modalTitle').textContent=title;$('modalBody').innerHTML=html;$('modal').classList.add('show')}
async function safe(label,fn,fb=[]){try{return await fn()}catch(e){console.warn(label,e); toast('تعذر تحميل '+label+': '+(e.message||e),false); return fb}}

let followups=[]; function today(){return new Date().toISOString().slice(0,10)} $('dueDate').value=today();
function isLate(f){return (f.status||'pending')!=='done' && String(f.dueDate||'') < today()}
function render(){const q=($('q').value||'').toLowerCase(), sf=$('statusFilter').value; const rows=followups.filter(f=>(!q||JSON.stringify(f).toLowerCase().includes(q))&&(sf==='all'||(sf==='late'?isLate(f):(f.status||'pending')===sf))); const pending=followups.filter(f=>(f.status||'pending')!=='done').length, late=followups.filter(isLate).length, done=followups.filter(f=>f.status==='done').length; $('stats').innerHTML=`<div class="card stat"><span>كل المتابعات</span><b>${followups.length}</b></div><div class="card stat"><span>بانتظار</span><b>${pending}</b></div><div class="card stat"><span>متأخرة</span><b class="bad">${late}</b></div><div class="card stat"><span>منتهية</span><b class="ok">${done}</b></div>`; $('rows').innerHTML=table(['التاريخ','العميل','الهاتف','المصدر','الملاحظة','الحالة','إجراءات'], rows.map(f=>`<tr><td>${esc(f.dueDate||dateOnly(f.createdAt))}</td><td><b>${esc(f.customerName||f.name)}</b></td><td class="ltr">${esc(f.phone)}</td><td>${esc(f.source||'')}</td><td>${esc(f.note||'')}</td><td>${f.status==='done'?'<span class="badge green">منتهية</span>':isLate(f)?'<span class="badge red">متأخرة</span>':'<span class="badge orange">بانتظار</span>'}</td><td><a class="mini green" target="_blank" href="https://wa.me/${onlyPhone(f.phone)}?text=${encodeURIComponent('مرحبًا '+(f.customerName||f.name||'')+'، نتابع معك بخصوص: '+(f.note||''))}">واتساب</a> <button class="mini blue" onclick="done('${f.id}')">تمت</button> <button class="mini red" onclick="del('${f.id}')">حذف</button></td></tr>`));}
async function load(){followups=await safe('followups',()=>WF().getCollection('followups',{limit:1200}),[]); setMsg('تم تحميل المتابعات. المشروع: '+WF().projectId,'notice ok'); render()}
$('refreshBtn').onclick=load; $('q').oninput=render; $('statusFilter').onchange=render;
$('addFollow').onclick=async()=>{const name=$('name').value.trim(),phone=$('phone').value.trim(),note=$('note').value.trim(); if(!name||!phone||!note) return toast('أدخل الاسم والهاتف والملاحظة',false); await WF().addDoc('followups',{customerName:name,phone,note,dueDate:$('dueDate').value||today(),source:$('source').value,status:'pending'}); ['name','phone','note'].forEach(id=>$(id).value=''); await load(); toast('تم حفظ المتابعة')};
window.done=async id=>{await WF().setDoc('followups',id,{status:'done',doneAt:new Date().toISOString()},true); await load(); toast('تم إنهاء المتابعة')}; window.del=async id=>{if(confirm('حذف المتابعة؟')){await WF().deleteDoc('followups',id); await load(); toast('تم الحذف')}};
$('exportCsv').onclick=()=>{const csv=['date,name,phone,source,status,note',...followups.map(f=>[f.dueDate||dateOnly(f.createdAt),f.customerName||f.name,f.phone,f.source,f.status,f.note].map(x=>'"'+String(x??'').replaceAll('"','""')+'"').join(','))].join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='followups.csv'; a.click()};
load().catch(e=>setMsg('خطأ: '+(e.message||e),'notice err'));
</script>
</body></html>
