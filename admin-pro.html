<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة تحكم وسام للإلكترونيات</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#e7eaf0;--orange:#f97316;--blue:#0f4c81;--green:#16a34a;--red:#dc2626;--dark:#111827;--shadow:0 16px 38px rgba(15,23,42,.08);--r:20px}
    *{box-sizing:border-box} body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#fff7ed 0,#f3f8ff 45%,#f5f7fb 100%);color:var(--text)}
    a{text-decoration:none;color:inherit} button,input,select,textarea{font:inherit} button{cursor:pointer}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:rgba(17,24,39,.96);color:#fff;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.07);margin-bottom:16px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--orange),#2563eb);display:grid;place-items:center;font-weight:900}.brand h1{font-size:17px;margin:0}.brand p{font-size:12px;color:#cbd5e1;margin:4px 0 0}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#dbe4f0;border-radius:14px;padding:13px 14px;text-align:right;display:flex;gap:10px;align-items:center}.nav button:hover,.nav button.active{background:#fff;color:#111827}.main{padding:20px;min-width:0}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.top h2{margin:0;font-size:24px}.top small{color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;color:#111827;font-weight:700}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:#2563eb;color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.dark{background:var(--dark);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.stat b{font-size:28px;display:block;margin-top:8px}.stat span{color:var(--muted);font-size:13px}.section{display:none}.section.active{display:block}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.search{min-width:240px;flex:1;border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:#fff}.table-wrap{overflow:auto;border-radius:18px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}th{background:#f8fafc;font-size:13px;color:#475569}td{font-size:13px}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.mini{padding:7px 9px;border-radius:10px;border:1px solid var(--line);background:#fff}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:#475569;font-weight:800}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;width:100%}.full{grid-column:1/-1}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.show{display:flex}.modal-box{width:min(840px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.25);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}.toast{position:fixed;left:18px;bottom:18px;z-index:80;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;display:none;box-shadow:var(--shadow)}.toast.show{display:block}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;padding:12px;border-radius:16px;margin-bottom:14px}.two{grid-template-columns:1fr 1fr}.print-only{display:none}
    @media(max-width:1000px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cards{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.main{padding:14px}}
    @media(max-width:560px){.cards,.two{grid-template-columns:1fr}.nav{grid-template-columns:1fr 1fr}.side{padding:12px}.brand{margin-bottom:10px}.search{min-width:100%}}
    @media print{body{background:#fff}.side,.top,.toolbar,.btn,.mini,.modal-head button{display:none!important}.app{display:block}.main{padding:0}.section{display:block}.section:not(.print-target){display:none}.card,.table-wrap{box-shadow:none;border:0}.print-only{display:block}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><div class="logo">و</div><div><h1>وسام للإلكترونيات</h1><p id="projectInfo">Firebase: جار الفحص...</p></div></div>
      <div class="nav" id="nav"></div>
    </aside>
    <main class="main">
      <div class="top"><div><h2 id="pageTitle">الرئيسية</h2><small id="pageSub">لوحة موحدة مرتبطة مع Firebase</small></div><div class="actions"><button class="btn ghost" id="btnInit">تهيئة Firebase</button><button class="btn blue" id="btnRefresh">تحديث</button><a class="btn primary" href="index.html" target="_blank">فتح الموقع</a></div></div>
      <div id="notice" class="notice">هذه نسخة تحسين أولى موحدة. إذا ظهرت رسالة صلاحيات، انشر ملف <b>firestore.rules</b> الموجود داخل النسخة.</div>
      <section id="dashboard" class="section active"></section>
      <section id="products" class="section"></section>
      <section id="orders" class="section"></section>
      <section id="repairs" class="section"></section>
      <section id="customers" class="section"></section>
      <section id="accounting" class="section"></section>
      <section id="settings" class="section"></section>
      <section id="diagnostics" class="section"></section>
    </main>
  </div>
  <div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">نافذة</h3><button class="btn red" onclick="closeModal()">إغلاق</button></div><div id="modalBody"></div></div></div>
  <div class="toast" id="toast"></div>
<script>
const WF = () => window.WesamFirebase;
const state = {products:[],orders:[],repairs:[],customers:[],tx:[],expenses:[],settings:{},current:'dashboard'};
const sections = [
  ['dashboard','الرئيسية','📊'],['products','المنتجات','📦'],['orders','طلبات البيع','🛒'],['repairs','طلبات الصيانة','🛠️'],['customers','العملاء','👥'],['accounting','المحاسبة','💰'],['settings','الإعدادات','⚙️'],['diagnostics','الفحص','🧪']
];
function $(id){return document.getElementById(id)}
function money(v){const n=Number(v||0); return n.toFixed(2)+' د.أ'}
function txt(v){return (v===undefined||v===null||v==='')?'—':String(v)}
function dateText(v){try{const d=v&&v.toDate?v.toDate():(v?new Date(v):null);return d&&!isNaN(d)?d.toLocaleString('ar-JO'):''}catch(e){return ''}}
function toast(msg,good=true){const t=$('toast');t.textContent=msg;t.style.background=good?'#111827':'#991b1b';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
function showError(e){console.error(e);toast(e.message||String(e),false)}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function openModal(title,html){$('modalTitle').textContent=title;$('modalBody').innerHTML=html;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
function bindNav(){ $('nav').innerHTML=sections.map(s=>`<button data-sec="${s[0]}" class="${s[0]==='dashboard'?'active':''}"><span>${s[2]}</span><b>${s[1]}</b></button>`).join(''); $('nav').onclick=e=>{const b=e.target.closest('button[data-sec]'); if(b) showSection(b.dataset.sec)} }
function showSection(id){state.current=id;document.querySelectorAll('.section').forEach(x=>x.classList.remove('active','print-target'));$(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.sec===id));const sec=sections.find(s=>s[0]===id);$('pageTitle').textContent=sec?sec[1]:id;render()}
async function loadAll(){ if(!WF()||!WF().db) throw new Error('Firebase غير محمل. تأكد من الإنترنت ومن firebase-config.js'); $('projectInfo').textContent='Firebase: '+WF().projectId; const safe=async(p,fb=[])=>{try{return await p()}catch(e){console.warn(e);return fb}}; state.settings=await safe(()=>WF().loadSettings(),{}); state.products=await safe(()=>WF().getCollection('products',{limit:800}),[]); state.orders=await safe(()=>WF().getCollection('orders',{limit:800}),[]); state.repairs=await safe(()=>WF().getCollection('service_requests',{limit:800}),[]); state.tx=await safe(()=>WF().getCollection('accounting_transactions',{limit:800}),[]); state.expenses=await safe(()=>WF().getCollection('expenses',{limit:800}),[]); state.customers=await buildCustomers(); render(); }
async function buildCustomers(){ const manual=await (async()=>{try{return await WF().getCollection('customers',{limit:800})}catch(e){return []}})(); const map=new Map(); function add(o,source){const phone=o.phone||o.customerPhone||o.mobile||o.whatsapp||''; const name=o.customerName||o.name||o.fullName||'عميل بدون اسم'; const key=phone||name; if(!key||key==='_template')return; const r=map.get(key)||{id:key,name,phone,total:0,count:0,last:'',sources:new Set()}; r.total+=Number(o.total||o.amount||o.finalTotal||o.price||0); r.count++; r.last=dateText(o.createdAt||o.updatedAt)||r.last; r.sources.add(source); map.set(key,r)} state.orders.forEach(o=>add(o,'بيع')); state.repairs.forEach(o=>add(o,'صيانة')); manual.forEach(o=>add(o,'يدوي')); return [...map.values()].map(r=>({...r,sources:[...r.sources].join('، ')})) }
function render(){ const fn={dashboard:renderDashboard,products:renderProducts,orders:renderOrders,repairs:renderRepairs,customers:renderCustomers,accounting:renderAccounting,settings:renderSettings,diagnostics:renderDiagnostics}[state.current]; if(fn) fn() }
function renderDashboard(){ const sales=state.orders.reduce((s,o)=>s+Number(o.total||o.finalTotal||o.amount||0),0); const repairIncome=state.repairs.reduce((s,o)=>s+Number(o.total||o.cost||o.amount||o.paidAmount||0),0); const manual=state.tx.reduce((s,t)=>s+(t.type==='expense'?-Number(t.amount||0):Number(t.amount||0)),0); const expenses=state.expenses.reduce((s,t)=>s+Number(t.amount||0),0); $('dashboard').innerHTML=`<div class="grid cards"><div class="card stat"><span>المنتجات</span><b>${state.products.length}</b></div><div class="card stat"><span>طلبات البيع</span><b>${state.orders.length}</b></div><div class="card stat"><span>طلبات الصيانة</span><b>${state.repairs.length}</b></div><div class="card stat"><span>صافي تقديري</span><b>${money(sales+repairIncome+manual-expenses)}</b></div></div><div class="grid two" style="margin-top:14px"><div class="card"><h3>آخر طلبات البيع</h3>${miniTable(state.orders.slice(0,8),'orders')}</div><div class="card"><h3>آخر طلبات الصيانة</h3>${miniTable(state.repairs.slice(0,8),'repairs')}</div></div>` }
function miniTable(rows,type){ if(!rows.length)return '<p style="color:#667085">لا توجد بيانات بعد.</p>'; return `<table style="min-width:0"><tbody>${rows.map(r=>`<tr><td>${esc(r.orderId||r.requestId||r.id)}</td><td>${esc(r.customerName||r.name||'')}</td><td>${esc(r.status||'new')}</td></tr>`).join('')}</tbody></table>` }
function table(headers,rows){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')||`<tr><td colspan="${headers.length}" style="text-align:center;color:#667085;padding:30px">لا توجد بيانات</td></tr>`}</tbody></table></div>`}
function renderProducts(){ $('products').innerHTML=`<div class="toolbar"><input id="prodSearch" class="search" placeholder="بحث في المنتجات"><button class="btn primary" onclick="productForm()">إضافة منتج</button></div>`+table(['الاسم','التصنيف','السعر','الكمية','الحالة','إجراءات'], state.products.map(p=>`<tr><td><b>${esc(p.name||p.title)}</b><br><small>${esc(p.description||'')}</small></td><td>${esc(p.category||p.cat)}</td><td>${money(p.sellPrice||p.sell||p.price)}</td><td>${txt(p.quantity||p.stock||p.qty)}</td><td>${p.active!==false&&p.visible!==false?'<span class="badge green">ظاهر</span>':'<span class="badge red">مخفي</span>'}</td><td><button class="mini" onclick='productForm(${JSON.stringify(p.id)})'>تعديل</button> <button class="mini" onclick="deleteRow('products','${p.id}')">حذف</button></td></tr>`)) }
function productForm(id){ const p=id?state.products.find(x=>x.id===id):{}; openModal(id?'تعديل منتج':'إضافة منتج',`<form class="form" onsubmit="saveProduct(event,'${id||''}')"><div class="field"><label>اسم المنتج</label><input name="name" value="${esc(p.name||'')}" required></div><div class="field"><label>التصنيف</label><input name="category" value="${esc(p.category||p.cat||'')}" required></div><div class="field"><label>سعر البيع</label><input name="sell" type="number" step="0.01" value="${esc(p.sell||p.sellPrice||p.price||0)}"></div><div class="field"><label>سعر الشراء</label><input name="buyPrice" type="number" step="0.01" value="${esc(p.buyPrice||p.buy||0)}"></div><div class="field"><label>الكمية</label><input name="stock" type="number" value="${esc(p.stock||p.quantity||0)}"></div><div class="field"><label>رابط الصورة</label><input name="image" value="${esc(p.image||p.imageUrl||'')}"></div><div class="field full"><label>الوصف</label><textarea name="description">${esc(p.description||'')}</textarea></div><div class="field"><label>ظاهر</label><select name="active"><option value="true" ${p.active!==false?'selected':''}>نعم</option><option value="false" ${p.active===false?'selected':''}>لا</option></select></div><div class="full"><button class="btn primary">حفظ في Firebase</button></div></form>`)}
async function saveProduct(e,id){e.preventDefault();try{const f=new FormData(e.target);const data=Object.fromEntries(f.entries());data.sell=Number(data.sell||0);data.price=data.sell;data.buyPrice=Number(data.buyPrice||0);data.stock=Number(data.stock||0);data.active=data.active==='true'; if(id) await WF().setDoc('products',id,data,true); else await WF().addDoc('products',data); closeModal();toast('تم حفظ المنتج');await loadAll()}catch(err){showError(err)}}
function renderOrders(){ renderDocSection('orders','orders',['رقم الطلب','العميل','الهاتف','الإجمالي','الحالة','إجراءات'], state.orders, 'order') }
function renderRepairs(){ renderDocSection('repairs','service_requests',['رقم الصيانة','العميل','الهاتف','الجهاز','الحالة','إجراءات'], state.repairs, 'repair') }
function renderDocSection(sec,col,headers,rows,type){ $(sec).innerHTML=`<div class="toolbar"><input class="search" placeholder="بحث"><button class="btn blue" onclick="loadAll()">تحديث من Firebase</button></div>`+table(headers, rows.map(r=>`<tr><td>${esc(r.orderId||r.requestId||r.id)}</td><td>${esc(r.customerName||r.name||'')}</td><td>${esc(r.phone||r.customerPhone||'')}</td><td>${type==='order'?money(r.total||r.finalTotal||r.amount):esc(r.deviceType||r.device||'')}</td><td>${statusSelect(col,r.id,r.status||'new')}</td><td><button class="mini" onclick='viewDoc(${JSON.stringify(col)},${JSON.stringify(r.id)})'>عرض</button> <button class="mini" onclick='printDoc(${JSON.stringify(col)},${JSON.stringify(r.id)})'>طباعة</button> <button class="mini" onclick="deleteRow('${col}','${r.id}')">حذف</button></td></tr>`)) }
function statusSelect(col,id,val){const opts=['new','confirmed','processing','completed','cancelled','delivered'];return `<select class="mini" onchange="updateStatus('${col}','${id}',this.value)">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select>`}
async function updateStatus(col,id,status){try{await WF().setDoc(col,id,{status},true);toast('تم تحديث الحالة')}catch(e){showError(e)}}
async function viewDoc(col,id){try{const d=await WF().getDoc(col,id);openModal('تفاصيل',`<pre style="white-space:pre-wrap;direction:ltr;text-align:left;background:#f8fafc;padding:14px;border-radius:16px">${esc(JSON.stringify(d,null,2))}</pre>`)}catch(e){showError(e)}}
async function printDoc(col,id){try{const d=await WF().getDoc(col,id);openModal('طباعة',`<div id="printBox"><h2>وسام للإلكترونيات</h2><p>رقم: ${esc(d.orderId||d.requestId||d.id)}</p><p>العميل: ${esc(d.customerName||d.name||'')}</p><p>الهاتف: ${esc(d.phone||d.customerPhone||'')}</p><p>الحالة: ${esc(d.status||'')}</p><hr><pre style="white-space:pre-wrap">${esc(JSON.stringify(d,null,2))}</pre></div><button class="btn primary" onclick="window.print()">طباعة الآن</button>`)}catch(e){showError(e)}}
async function deleteRow(col,id){ if(!confirm('تأكيد الحذف من Firebase؟'))return; try{await WF().deleteDoc(col,id);toast('تم الحذف');await loadAll()}catch(e){showError(e)} }
function renderCustomers(){ $('customers').innerHTML=`<div class="toolbar"><button class="btn primary" onclick="customerForm()">إضافة عميل</button><button class="btn blue" onclick="loadAll()">تحديث</button></div>`+table(['الاسم','الهاتف','المصدر','عدد الطلبات','إجمالي تقريبي','إجراءات'],state.customers.map(c=>`<tr><td>${esc(c.name)}</td><td><a href="https://wa.me/${String(c.phone).replace(/\D/g,'')}" target="_blank">${esc(c.phone)}</a></td><td>${esc(c.sources)}</td><td>${c.count}</td><td>${money(c.total)}</td><td><button class="mini" onclick='openModal("سجل العميل", `<pre>${esc(JSON.stringify(c,null,2))}</pre>`)'>عرض</button></td></tr>`)) }
function customerForm(){openModal('إضافة عميل',`<form class="form" onsubmit="saveCustomer(event)"><div class="field"><label>الاسم</label><input name="name" required></div><div class="field"><label>الهاتف</label><input name="phone" required></div><div class="field full"><label>ملاحظات</label><textarea name="notes"></textarea></div><div class="full"><button class="btn primary">حفظ</button></div></form>`)}
async function saveCustomer(e){e.preventDefault();try{await WF().addDoc('customers',Object.fromEntries(new FormData(e.target).entries()));closeModal();toast('تم حفظ العميل');await loadAll()}catch(err){showError(err)}}
function renderAccounting(){ const sales=state.orders.reduce((s,o)=>s+Number(o.total||o.finalTotal||o.amount||0),0); const repairs=state.repairs.reduce((s,o)=>s+Number(o.total||o.cost||o.amount||o.paidAmount||0),0); const incomeTx=state.tx.filter(t=>t.type!=='expense').reduce((s,t)=>s+Number(t.amount||0),0); const expTx=state.tx.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount||0),0)+state.expenses.reduce((s,t)=>s+Number(t.amount||0),0); const rows=[...state.tx.map(t=>({...t,src:'يدوي'})),...state.expenses.map(t=>({...t,type:'expense',src:'مصروف'}))]; $('accounting').innerHTML=`<div class="grid cards"><div class="card stat"><span>مبيعات</span><b>${money(sales)}</b></div><div class="card stat"><span>صيانة</span><b>${money(repairs)}</b></div><div class="card stat"><span>مصروفات</span><b>${money(expTx)}</b></div><div class="card stat"><span>الصافي</span><b>${money(sales+repairs+incomeTx-expTx)}</b></div></div><div class="toolbar" style="margin-top:14px"><button class="btn primary" onclick="txForm('income')">إضافة إيراد</button><button class="btn red" onclick="txForm('expense')">إضافة مصروف</button><button class="btn ghost" onclick="window.print()">طباعة تقرير</button></div>`+table(['التاريخ','النوع','الوصف','المبلغ','المصدر','إجراءات'],rows.map(t=>`<tr><td>${dateText(t.createdAt||t.date)}</td><td>${t.type==='expense'?'<span class="badge red">مصروف</span>':'<span class="badge green">إيراد</span>'}</td><td>${esc(t.description||t.category||'')}</td><td>${money(t.amount)}</td><td>${esc(t.src||t.source||'')}</td><td>${t.id?`<button class="mini" onclick="deleteRow('${t.src==='مصروف'?'expenses':'accounting_transactions'}','${t.id}')">حذف</button>`:''}</td></tr>`)) }
function txForm(type){openModal(type==='expense'?'إضافة مصروف':'إضافة إيراد',`<form class="form" onsubmit="saveTx(event,'${type}')"><div class="field"><label>الوصف</label><input name="description" required></div><div class="field"><label>المبلغ</label><input name="amount" type="number" step="0.01" required></div><div class="field full"><label>ملاحظة</label><textarea name="notes"></textarea></div><div class="full"><button class="btn primary">حفظ</button></div></form>`)}
async function saveTx(e,type){e.preventDefault();try{const data=Object.fromEntries(new FormData(e.target).entries());data.amount=Number(data.amount);data.type=type;await WF().addDoc(type==='expense'?'expenses':'accounting_transactions',data);closeModal();toast('تم حفظ الحركة');await loadAll()}catch(err){showError(err)}}
function renderSettings(){ const s=state.settings||{}; $('settings').innerHTML=`<div class="card"><form class="form" onsubmit="saveSettingsForm(event)"><div class="field"><label>اسم المتجر</label><input name="storeName" value="${esc(s.storeName||s.siteName||'وسام للإلكترونيات')}"></div><div class="field"><label>الهاتف</label><input name="phone" value="${esc(s.phone||'')}"></div><div class="field"><label>واتساب</label><input name="whatsapp" value="${esc(s.whatsapp||'')}"></div><div class="field"><label>البريد</label><input name="email" value="${esc(s.email||'')}"></div><div class="field full"><label>العنوان</label><input name="address" value="${esc(s.address||'')}"></div><div class="field"><label>المتجر مفعل</label><select name="storeEnabled"><option value="true" ${s.storeEnabled!==false?'selected':''}>نعم</option><option value="false" ${s.storeEnabled===false?'selected':''}>لا</option></select></div><div class="field"><label>الصيانة مفعلة</label><select name="repairsEnabled"><option value="true" ${s.repairsEnabled!==false?'selected':''}>نعم</option><option value="false" ${s.repairsEnabled===false?'selected':''}>لا</option></select></div><div class="full"><button class="btn primary">حفظ الإعدادات في Firebase</button></div></form></div>` }
async function saveSettingsForm(e){e.preventDefault();try{const d=Object.fromEntries(new FormData(e.target).entries());d.storeEnabled=d.storeEnabled==='true';d.repairsEnabled=d.repairsEnabled==='true';await WF().saveSettings(d);toast('تم حفظ الإعدادات');await loadAll()}catch(err){showError(err)}}
function renderDiagnostics(){ $('diagnostics').innerHTML=`<div class="card"><h3>فحص الاتصال</h3><p>المشروع: <b>${WF()?WF().projectId:'غير محمل'}</b></p><p>المنتجات: ${state.products.length}</p><p>الطلبات: ${state.orders.length}</p><p>الصيانة: ${state.repairs.length}</p><div class="actions"><button class="btn primary" onclick="runInit()">إنشاء المجموعات الأساسية</button><button class="btn blue" onclick="loadAll().then(()=>toast('تم التحديث'))">اختبار القراءة</button></div><pre id="diagOut" style="white-space:pre-wrap;background:#f8fafc;padding:14px;border-radius:16px;margin-top:12px"></pre></div>` }
async function runInit(){try{const r=await WF().ensureCoreCollections({force:true});$('diagOut').textContent=JSON.stringify(r,null,2);toast('تمت التهيئة')}catch(e){$('diagOut').textContent=e.message;showError(e)}}
$('btnRefresh').onclick=()=>loadAll().then(()=>toast('تم التحديث')).catch(showError);$('btnInit').onclick=runInit;
bindNav();
setTimeout(()=>loadAll().catch(e=>{showError(e); renderDiagnostics(); showSection('diagnostics')}),500);
</script>
</body>
</html>
