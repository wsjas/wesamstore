<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التقارير الذكية</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
<style>
:root{--bg:#f6f8fc;--card:#fff;--text:#142033;--muted:#64748b;--line:#e5e7eb;--orange:#f97316;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--dark:#111827;--violet:#7c3aed;--shadow:0 16px 40px rgba(15,23,42,.08);--r:20px}
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#fff3e5 0,#f6f8fc 42%,#eef6ff 100%);color:var(--text)}
a{color:inherit;text-decoration:none}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{max-width:1240px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}.brand{display:flex;gap:12px;align-items:center}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--orange),var(--blue));display:grid;place-items:center;color:#fff;font-size:24px;font-weight:900}.brand h1{font-size:24px;margin:0 0 5px}.brand p{margin:0;color:var(--muted);line-height:1.6}.actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:7px}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.dark{background:var(--dark);color:#fff}.btn.violet{background:var(--violet);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:30px;margin-top:6px}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;margin:12px 0;line-height:1.8}.notice.err{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.notice.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.toolbar{margin:12px 0}.search,.filter,input,select,textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;min-width:0}.search{min-width:260px;flex:1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}th{background:#f8fafc;color:#475569;font-size:13px}td{font-size:13px}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.badge.blue{background:#dbeafe;color:#1e40af}.badge.violet{background:#ede9fe;color:#5b21b6}.badge.gray{background:#f1f5f9;color:#334155}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;font-weight:900;color:#475569}.field textarea{min-height:90px;resize:vertical}.full{grid-column:1/-1}.modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.show{display:flex}.modal-box{width:min(920px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 25px 80px rgba(0,0,0,.25);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}.toast{position:fixed;left:18px;bottom:18px;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;display:none;z-index:80}.toast.show{display:block}.ltr{direction:ltr;text-align:left}.mini{padding:7px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:800}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.empty{text-align:center;color:var(--muted);padding:20px}.kpi{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--line);padding:9px 0}.progress{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--blue));width:0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tabs button.active{background:var(--dark);color:#fff}.print-area{display:none}@media(max-width:900px){.cards,.two,.three{grid-template-columns:1fr}.top{flex-direction:column}.form{grid-template-columns:1fr}.search{min-width:100%}.wrap{padding:12px}.brand h1{font-size:20px}}@media print{body{background:#fff}.no-print,.toolbar,.top .actions,.btn,.modal-head button{display:none!important}.wrap{max-width:none;padding:0}.card,.table-wrap{box-shadow:none;border:0}.print-area{display:block}}
</style></head>
<body><div class="wrap"><header class="top no-print"><div class="brand"><div class="logo">و</div><div><h1>التقارير الذكية</h1><p>تقرير مالي حسب فترة محددة مع طباعة وتصدير CSV.</p></div></div><div class="actions"><a class="btn ghost" href="admin.html">لوحة التحكم</a><button class="btn primary" onclick="loadAll()">تحديث</button><button class="btn dark" onclick="window.print()">طباعة</button></div></header><div id="notice" class="notice">جار الاتصال مع Firebase...</div>
<div class="toolbar no-print"><label>من <input id="from" type="date" class="filter"></label><label>إلى <input id="to" type="date" class="filter"></label><button class="btn primary" onclick="render()">تطبيق</button><button class="btn blue" onclick="exportReport()">تصدير CSV</button></div>
<section class="grid cards" id="stats"></section>
<section class="grid two"><div class="card"><h3>مؤشر الإيرادات والمصروفات</h3><div id="bars"></div></div><div class="card"><h3>ملخص سريع</h3><div id="summary"></div></div></section>
<section id="details" style="margin-top:14px"></section>
</div><div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">نافذة</h3><button class="btn red" onclick="closeModal()">إغلاق</button></div><div id="modalBody"></div></div></div><div class="toast" id="toast"></div><script>
const $=id=>document.getElementById(id);
const WF=()=>window.WesamFirebase;
const JOD=v=>(Number(v||0)).toFixed(2)+' د.أ';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const phoneLink=p=>{const x=String(p||'').replace(/\D/g,'').replace(/^0/,'962');return x?`https://wa.me/${x}`:'#'};
function dateText(v){try{const d=v&&v.toDate?v.toDate():(v?new Date(v):null);return d&&!isNaN(d)?d.toLocaleString('ar-JO'):'—'}catch(e){return '—'}}
function dateOnly(v){try{const d=v&&v.toDate?v.toDate():(v?new Date(v):new Date());return d&&!isNaN(d)?d.toISOString().slice(0,10):''}catch(e){return ''}}
function getAmount(o){return Number(o.total??o.finalTotal??o.amount??o.grandTotal??o.sell??o.price??0)}
function getPaid(o){return Number(o.paidAmount??o.paid??o.deposit??0)}
function getRemain(o,total){return Math.max(0,Number(total||0)-getPaid(o))}
function statusBadge(s){s=String(s||'new');const m={new:['جديد','orange'],confirmed:['مؤكد','blue'],processing:['قيد التنفيذ','violet'],preparing:['تحضير','blue'],delivering:['توصيل','blue'],completed:['مكتمل','green'],delivered:['تم التسليم','green'],cancelled:['ملغي','red'],pending:['بانتظار','orange'],paid:['مدفوع','green'],partial:['جزئي','orange'],unpaid:['غير مدفوع','red'],waiting_customer:['بانتظار العميل','orange'],waiting_parts:['بانتظار قطع','orange'],checked:['تم الفحص','blue']};const x=m[s]||[s,'gray'];return `<span class="badge ${x[1]}">${x[0]}</span>`}
function toast(m,ok=true){const t=$('toast'); if(!t)return; t.textContent=m;t.style.background=ok?'#111827':'#991b1b';t.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('show'),3600)}
function showErr(e){console.error(e);toast(e&&e.message?e.message:String(e),false);const n=$('notice');if(n){n.className='notice err';n.textContent=e&&e.message?e.message:String(e)}}
function table(headers,rows,empty='لا توجد بيانات'){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="empty">${empty}</td></tr>`}</tbody></table></div>`}
function openModal(title,html){$('modalTitle').textContent=title;$('modalBody').innerHTML=html;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show');$('modalBody').innerHTML=''}
function formData(form){const d=Object.fromEntries(new FormData(form).entries());Object.keys(d).forEach(k=>{if(['amount','total','paidAmount','quantity','stock','cost','value'].includes(k))d[k]=Number(d[k]||0)});return d}
function csvDownload(name, rows){if(!rows.length){toast('لا توجد بيانات للتصدير',false);return}const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];const csv=[keys.join(','),...rows.map(r=>keys.map(k=>'"'+String(r[k]??'').replace(/"/g,'""')+'"').join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download=name;document.body.appendChild(a);a.click();a.remove()}
function daysOld(row){try{const d=row.createdAt&&row.createdAt.toDate?row.createdAt.toDate():(row.createdAt?new Date(row.createdAt):new Date());return Math.floor((Date.now()-d.getTime())/86400000)}catch(e){return 0}}


let orders=[], repairs=[], tx=[], expenses=[], payments=[], lines=[];
async function loadAll(){try{if(!WF()||!WF().db)throw new Error('Firebase غير مهيأ');$('notice').className='notice ok';$('notice').textContent='تم تحميل بيانات التقارير.';orders=await WF().getCollection('orders',{limit:2000});repairs=await WF().getCollection('service_requests',{limit:2000});tx=await WF().getCollection('accounting_transactions',{limit:2000});expenses=await WF().getCollection('expenses',{limit:2000});payments=await WF().getCollection('payments',{limit:2000});const today=new Date();$('to').value=today.toISOString().slice(0,10);const first=new Date(today.getFullYear(),today.getMonth(),1);$('from').value=first.toISOString().slice(0,10);render()}catch(e){showErr(e)}}
function inRange(r){const f=$('from').value,t=$('to').value;const d=dateOnly(r.createdAt||r.date);return (!f||d>=f)&&(!t||d<=t)}
function render(){lines=[];orders.filter(inRange).forEach(o=>lines.push({date:dateOnly(o.createdAt),source:'بيع',description:o.orderId||o.id,income:getAmount(o),expense:0}));repairs.filter(inRange).forEach(r=>lines.push({date:dateOnly(r.createdAt),source:'صيانة',description:r.requestId||r.id,income:getAmount(r),expense:0}));tx.filter(inRange).forEach(x=>lines.push({date:dateOnly(x.createdAt||x.date),source:x.type==='expense'?'مصروف يدوي':'إيراد يدوي',description:x.description||x.id,income:x.type==='expense'?0:Number(x.amount||0),expense:x.type==='expense'?Number(x.amount||0):0}));expenses.filter(inRange).forEach(x=>lines.push({date:dateOnly(x.createdAt||x.date),source:'مصروف',description:x.description||x.category||x.id,income:0,expense:Number(x.amount||0)}));payments.filter(inRange).forEach(x=>lines.push({date:dateOnly(x.createdAt||x.date),source:'دفعة',description:x.note||x.sourceId||x.id,income:Number(x.amount||0),expense:0}));lines.sort((a,b)=>String(b.date).localeCompare(String(a.date)));const income=lines.reduce((s,l)=>s+l.income,0), expense=lines.reduce((s,l)=>s+l.expense,0), net=income-expense;$('stats').innerHTML=`<div class="card stat"><span>إجمالي الداخل</span><b>${JOD(income)}</b></div><div class="card stat"><span>إجمالي الخارج</span><b>${JOD(expense)}</b></div><div class="card stat"><span>الصافي</span><b>${JOD(net)}</b></div><div class="card stat"><span>عدد الحركات</span><b>${lines.length}</b></div>`;const max=Math.max(income,expense,1);$('bars').innerHTML=`<p>الداخل ${JOD(income)}</p><div class="progress"><span style="width:${Math.min(100,income/max*100)}%"></span></div><p>الخارج ${JOD(expense)}</p><div class="progress"><span style="width:${Math.min(100,expense/max*100)}%"></span></div>`;$('summary').innerHTML=`<div class="kpi"><span>بيع</span><b>${JOD(lines.filter(x=>x.source==='بيع').reduce((s,x)=>s+x.income,0))}</b></div><div class="kpi"><span>صيانة</span><b>${JOD(lines.filter(x=>x.source==='صيانة').reduce((s,x)=>s+x.income,0))}</b></div><div class="kpi"><span>دفعات</span><b>${JOD(lines.filter(x=>x.source==='دفعة').reduce((s,x)=>s+x.income,0))}</b></div><div class="kpi"><span>مصروفات</span><b>${JOD(expense)}</b></div>`;$('details').innerHTML=table(['التاريخ','المصدر','الوصف','داخل','خارج','الصافي'],lines.map(l=>`<tr><td>${esc(l.date)}</td><td>${esc(l.source)}</td><td>${esc(l.description)}</td><td>${JOD(l.income)}</td><td>${JOD(l.expense)}</td><td>${JOD(l.income-l.expense)}</td></tr>`),'لا توجد حركات في الفترة')}
function exportReport(){csvDownload('wesam-smart-report.csv',lines)}
window.addEventListener('load',loadAll);
</script></body></html>
