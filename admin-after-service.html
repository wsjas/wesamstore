<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>متابعة ما بعد الإصلاح</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="wesam-error-logger.js"></script>
  <style>
:root{--bg:#f6f8fc;--card:#fff;--text:#142033;--muted:#64748b;--line:#e5e7eb;--orange:#f97316;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--dark:#111827;--violet:#7c3aed;--shadow:0 18px 44px rgba(15,23,42,.08);--r:20px}
*{box-sizing:border-box} body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#fff3e5 0,#f6f8fc 42%,#eef6ff 100%);color:var(--text)}
a{color:inherit;text-decoration:none} button,input,select,textarea{font:inherit} button{cursor:pointer}
.wrap{max-width:1320px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap}h1{margin:0;font-size:25px}.muted{color:var(--muted);line-height:1.7}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}label{font-size:13px;color:#475569;font-weight:900;display:block;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}textarea{min-height:92px;resize:vertical}.actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;color:#111827;font-weight:800;display:inline-flex;align-items:center;gap:7px;justify-content:center}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:white}.btn.blue{background:var(--blue);color:white}.btn.green{background:var(--green);color:white}.btn.red{background:var(--red);color:white}.btn.dark{background:var(--dark);color:white}.btn.violet{background:var(--violet);color:white}.btn.ghost{background:white;border:1px solid var(--line)}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;margin-bottom:14px;line-height:1.8}.notice.ok{background:#f0fdf4;border-color:#86efac;color:#166534}.notice.err{background:#fef2f2;border-color:#fca5a5;color:#991b1b}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:white;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top;font-size:13px}th{background:#f8fafc;color:#475569;position:sticky;top:0}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.badge.blue{background:#dbeafe;color:#1e40af}.badge.gray{background:#f1f5f9;color:#334155}.badge.violet{background:#ede9fe;color:#5b21b6}.mini{padding:7px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:800}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.mini.orange{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.stat b{display:block;font-size:28px;margin-top:6px}.kpi{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}.ltr{direction:ltr;text-align:left}.hidden{display:none!important}.toast{position:fixed;left:18px;bottom:18px;background:#111827;color:#fff;border-radius:14px;padding:12px 16px;box-shadow:var(--shadow);display:none;z-index:50;max-width:min(560px,calc(100vw - 36px));line-height:1.7}.toast.show{display:block}.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(135deg,var(--orange),var(--blue));width:0%}.code{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:18px;padding:14px;direction:ltr;text-align:left;overflow:auto}
@media(max-width:900px){.grid,.grid3,.grid4{grid-template-columns:1fr}.wrap{padding:12px}h1{font-size:21px}table{min-width:780px}}
@media print{.top,.toolbar,.no-print,.btn,.mini{display:none!important}body{background:white}.card,.table-wrap{box-shadow:none;border:0}.wrap{max-width:none;padding:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>متابعة ما بعد الإصلاح</h1><div class="muted">متابعة رضا العميل بعد تسليم الجهاز وربط المتابعة بطلب الصيانة والضمان.</div></div>
    <div class="actions no-print"><a class="btn ghost" href="admin.html">رجوع للوحة</a><button class="btn blue" onclick="location.reload()">تحديث</button><button class="btn ghost" onclick="window.print()">طباعة</button><a class="btn primary" href="index.html" target="_blank">فتح الموقع</a></div>
  </div>
  <div id="msg" class="notice">جار الاتصال مع Firebase...</div>
  
<div class="grid4" id="stats"></div>
<div class="card"><h2>إضافة متابعة بعد الإصلاح</h2><form id="form" class="grid"><input type="hidden" id="docId"><div><label>اسم العميل</label><input id="customerName" required></div><div><label>الهاتف</label><input id="phone"></div><div><label>رقم طلب الصيانة</label><input id="serviceId" placeholder="SR-..."></div><div><label>نوع الجهاز</label><input id="deviceType" placeholder="شاشة LED"></div><div><label>تاريخ الإصلاح</label><input id="repairDate" type="date"></div><div><label>تاريخ المتابعة</label><input id="followDate" type="date"></div><div><label>الحالة</label><select id="status"><option value="pending">بانتظار المتابعة</option><option value="done">تمت المتابعة</option><option value="review">بحاجة مراجعة</option><option value="closed">مغلق</option></select></div><div><label>نتيجة المتابعة</label><select id="result"><option value="">غير محدد</option><option value="satisfied">العميل راضٍ</option><option value="issue">يوجد ملاحظة</option><option value="no_answer">لم يرد</option></select></div><div class="full"><label>ملاحظات</label><textarea id="notes"></textarea></div><div class="full actions"><button class="btn primary">حفظ المتابعة</button><button type="button" class="btn blue" onclick="importCompletedRepairs()">جلب صيانة مكتملة</button><button type="button" class="btn ghost" onclick="resetForm()">تفريغ</button></div></form></div>
<div class="card"><div class="toolbar"><input id="q" placeholder="بحث" oninput="render()"><select id="statusFilter" onchange="render()"><option value="">كل الحالات</option><option value="pending">بانتظار</option><option value="done">تمت</option><option value="review">مراجعة</option><option value="closed">مغلق</option></select><button class="btn blue" onclick="load()">تحديث</button><button class="btn ghost" onclick="exportCSV()">تصدير CSV</button></div><div id="list"></div></div>

</div>
<div id="toast" class="toast"></div>
<script>

(function(){
'use strict';
const $ = id => document.getElementById(id);
const F = () => window.WesamFirebase;
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const JOD = v => (Number(v||0)).toFixed(2) + ' د.أ';
const phoneOnly = p => String(p||'').replace(/\D/g,'').replace(/^0/,'962');
function toast(msg, ok=true){ const t=$('toast'); t.textContent=msg; t.style.background=ok?'#111827':'#991b1b'; t.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>t.classList.remove('show'),4200); }
function setMsg(text, cls='notice'){ const m=$('msg'); if(m){m.className=cls; m.textContent=text;} }
function today(){ return new Date().toISOString().slice(0,10); }
function dateText(v){ try{ const d = v && v.toDate ? v.toDate() : (v ? new Date(v) : null); return d && !isNaN(d) ? d.toLocaleString('ar-JO') : '—'; }catch(e){ return '—'; } }
function daysBetween(v){ try{ const d = v && v.toDate ? v.toDate() : new Date(v); if(!d || isNaN(d)) return 0; return Math.floor((new Date()-d)/86400000); }catch(e){return 0;} }
function badge(s){ const map={active:['فعال','green'],inactive:['معطل','gray'],draft:['مسودة','gray'],published:['منشور','green'],scheduled:['مجدول','blue'],ended:['منتهي','gray'],paid:['مدفوع','green'],partial:['جزئي','orange'],unpaid:['غير مدفوع','red'],open:['مفتوح','orange'],new:['جديد','orange'],review:['مراجعة','blue'],resolved:['تم الحل','green'],closed:['مغلق','gray'],urgent:['عاجل','red'],normal:['عادي','blue'],low:['منخفض','gray'],passed:['ناجح','green'],failed:['فشل','red'],done:['منجز','green'],pending:['بانتظار','orange'],valid:['ساري','green'],expired:['منتهي','red']}; const x=map[String(s||'pending')]||[String(s||'pending'),'gray']; return `<span class="badge ${x[1]}">${x[0]}</span>`; }
function table(headers, rows, empty='لا توجد بيانات'){ return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" style="text-align:center;color:#64748b;padding:28px">${empty}</td></tr>`}</tbody></table></div>`; }
async function requireFirebase(){ if(!F() || !F().db) throw new Error('Firebase غير محمل. تأكد من الإنترنت ومن ملف firebase-config.js'); await F().ensureCoreCollections({force:false}).catch(()=>null); setMsg('تم الاتصال مع Firebase: ' + F().projectId, 'notice ok'); }
async function audit(action, description){ try{ await F().addDoc('audit_logs',{action, description, page:location.pathname, createdAt:new Date().toISOString()}); }catch(e){} }
function csvDownload(filename, rows){ const csv = rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href); }
window.addEventListener('error', e => setMsg('خطأ JavaScript: ' + (e.message||'غير معروف'), 'notice err'));


let rows=[], repairs=[];
async function init(){ await requireFirebase(); $('repairDate').value=today(); $('followDate').value=today(); $('form').addEventListener('submit', save); await load(); }
async function load(){ [rows,repairs]=await Promise.all([F().getCollection('after_service_followups',{limit:500}).catch(()=>[]),F().getCollection('service_requests',{limit:500}).catch(()=>[])]); render(); }
function resetForm(){ ['docId','customerName','phone','serviceId','deviceType','notes','result'].forEach(id=>$(id).value=''); $('status').value='pending'; $('repairDate').value=today(); $('followDate').value=today(); }
async function save(e){ e.preventDefault(); const data={customerName:$('customerName').value.trim(),phone:$('phone').value.trim(),serviceId:$('serviceId').value.trim(),deviceType:$('deviceType').value.trim(),repairDate:$('repairDate').value,followDate:$('followDate').value,status:$('status').value,result:$('result').value,notes:$('notes').value.trim()}; if(!data.customerName) return toast('اكتب اسم العميل',false); if($('docId').value) await F().setDoc('after_service_followups',$('docId').value,data,true); else await F().addDoc('after_service_followups',data); toast('تم حفظ المتابعة'); await audit('save_after_service',data.customerName); resetForm(); await load(); }
window.editRow=function(id){ const r=rows.find(x=>x.id===id); if(!r) return; ['docId','customerName','phone','serviceId','deviceType','repairDate','followDate','status','result','notes'].forEach(k=>$(k).value=r[k]??''); scrollTo({top:0,behavior:'smooth'}); }
window.delRow=async function(id){ if(!confirm('حذف المتابعة؟')) return; await F().deleteDoc('after_service_followups',id); toast('تم الحذف'); await load(); }
window.markDone=async function(id){ await F().setDoc('after_service_followups',id,{status:'done',doneAt:new Date().toISOString()},true); toast('تم إنهاء المتابعة'); await load(); }
window.importCompletedRepairs=async function(){ const completed=repairs.filter(r=>['completed','delivered','done','تم التسليم','تم الإصلاح'].includes(String(r.status||''))).slice(0,30); let n=0; for(const r of completed){ const exists=rows.some(x=>String(x.serviceId||'')===String(r.requestId||r.id)); if(exists) continue; await F().addDoc('after_service_followups',{customerName:r.customerName||r.name||'',phone:r.phone||'',serviceId:r.requestId||r.id,deviceType:r.deviceType||'',repairDate:new Date().toISOString().slice(0,10),followDate:new Date(Date.now()+3*86400000).toISOString().slice(0,10),status:'pending',notes:'تم إنشاؤها تلقائيًا من طلب صيانة مكتمل'}); n++; } toast('تم إنشاء '+n+' متابعة'); await load(); }
function render(){ const q=$('q').value.trim().toLowerCase(), sf=$('statusFilter').value; let filtered=rows.filter(r=>(!sf||r.status===sf)&&(!q||JSON.stringify(r).toLowerCase().includes(q))); const due=rows.filter(r=>r.status==='pending' && r.followDate && r.followDate<=today()).length; $('stats').innerHTML=`<div class="card stat"><span>كل المتابعات</span><b>${rows.length}</b></div><div class="card stat"><span>مستحقة</span><b>${due}</b></div><div class="card stat"><span>تمت</span><b>${rows.filter(r=>r.status==='done').length}</b></div><div class="card stat"><span>بحاجة مراجعة</span><b>${rows.filter(r=>r.status==='review').length}</b></div>`; $('list').innerHTML=table(['العميل','الهاتف','طلب الصيانة','الجهاز','تاريخ المتابعة','الحالة','ملاحظات','إجراء'], filtered.map(r=>`<tr><td><b>${esc(r.customerName)}</b></td><td class="ltr">${esc(r.phone)}</td><td>${esc(r.serviceId)}</td><td>${esc(r.deviceType)}</td><td>${esc(r.followDate)} ${r.followDate<=today()&&r.status==='pending'?badge('urgent'):''}</td><td>${badge(r.status)}</td><td>${esc(r.notes)}</td><td><a class="mini green" target="_blank" href="https://wa.me/${phoneOnly(r.phone)}">واتساب</a> <button class="mini blue" onclick="editRow('${r.id}')">تعديل</button> <button class="mini green" onclick="markDone('${r.id}')">تمت</button> <button class="mini red" onclick="delRow('${r.id}')">حذف</button></td></tr>`)); }
window.render=render; window.load=load; window.resetForm=resetForm; window.exportCSV=function(){ csvDownload('after-service-followups.csv',[['العميل','الهاتف','طلب الصيانة','الجهاز','تاريخ المتابعة','الحالة','ملاحظات'],...rows.map(r=>[r.customerName,r.phone,r.serviceId,r.deviceType,r.followDate,r.status,r.notes])]); };
init().catch(e=>{console.error(e); setMsg(e.message||String(e),'notice err');});

})();
</script>
</body>
</html>
