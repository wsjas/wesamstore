<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>قواعد التشغيل التلقائي - وسام</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="admin-safe-loader.js"></script>
  <script src="wesam-error-logger.js"></script>
  <style>
    :root{--orange:#f97316;--blue:#2563eb;--dark:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc;--green:#16a34a;--red:#dc2626;--violet:#7c3aed;--shadow:0 14px 40px rgba(15,23,42,.08);--r:22px}
    *{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#fff7ed,#eff6ff 55%,#f8fafc);color:#0f172a}a{color:inherit;text-decoration:none}.wrap{max-width:1280px;margin:auto;padding:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;position:sticky;top:0;background:rgba(248,250,252,.92);backdrop-filter:blur(10px);z-index:5;border-bottom:1px solid var(--line);padding:12px 0}.brand h1{margin:0;font-size:24px}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.violet{background:var(--violet);color:#fff}.btn.dark{background:var(--dark);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:28px;margin-top:6px}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:#475569;font-weight:900}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}.field textarea{min-height:90px;resize:vertical}.full{grid-column:1/-1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:940px}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top;font-size:13px}th{background:#f8fafc;color:#475569;position:sticky;top:0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.search{min-width:260px;flex:1;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;line-height:1.7;margin-bottom:14px}.notice.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.notice.err{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.mini{padding:7px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:800;cursor:pointer}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.hidden{display:none!important}.toast{position:fixed;left:18px;bottom:18px;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:20;max-width:min(560px,calc(100vw - 36px));line-height:1.7}.toast.show{display:block}.modal{position:fixed;inset:0;background:rgba(15,23,42,.6);display:none;align-items:center;justify-content:center;padding:18px;z-index:30}.modal.show{display:flex}.modal-box{width:min(900px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:26px;padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.28)}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:14px;direction:ltr;text-align:left;overflow:auto}.muted{color:var(--muted)}@media(max-width:850px){.cards,.two,.three,.form{grid-template-columns:1fr}.top{position:relative;flex-direction:column;align-items:stretch}.search{min-width:100%}.wrap{padding:12px}table{min-width:760px}}@media print{.top,.actions,.toolbar,.btn,.mini,.notice{display:none!important}body{background:#fff}.wrap{max-width:none}.card,.table-wrap{box-shadow:none;border:0}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><h1>قواعد التشغيل والتنبيهات</h1><p>إنشاء قواعد بسيطة للتنبيهات ورسائل المتابعة وسجل النشاط.</p></div>
    <div class="actions"><a class="btn ghost" href="admin.html">لوحة التحكم</a><button class="btn dark" onclick="window.print()">طباعة</button></div>
  </div>
  <div id="status" class="notice">جار تحميل Firebase...</div>

<div class="grid cards" id="stats"></div><div class="card"><h2>قاعدة تشغيل تلقائي</h2><form id="ruleForm" class="form"><input type="hidden" name="id" id="editId"><div class="field"><label>اسم القاعدة</label><input name="title" required></div><div class="field"><label>الحالة</label><select name="active"><option value="true">مفعلة</option><option value="false">موقوفة</option></select></div><div class="field"><label>المجموعة</label><select name="collectionName"><option value="orders">طلبات البيع</option><option value="service_requests">طلبات الصيانة</option><option value="followups">المتابعات</option><option value="products">المنتجات</option></select></div><div class="field"><label>عند الحالة</label><input name="triggerStatus" placeholder="new أو completed أو low_stock"></div><div class="field"><label>الإجراء</label><select name="action"><option value="create_notification">إنشاء إشعار</option><option value="whatsapp_template">تجهيز رسالة واتساب</option><option value="audit_log">تسجيل نشاط</option></select></div><div class="field"><label>الأولوية</label><select name="priority"><option>normal</option><option>high</option><option>urgent</option></select></div><div class="field full"><label>نص الرسالة / القالب</label><textarea name="message" placeholder="مثال: طلب جديد يحتاج متابعة"></textarea></div><div class="full actions"><button class="btn primary">حفظ القاعدة</button><button type="button" class="btn blue" onclick="testRule()">اختبار القاعدة</button><button type="button" class="btn ghost" onclick="resetForm()">جديد</button></div></form></div>
<div class="toolbar"><input id="q" class="search" placeholder="بحث"><button class="btn blue" onclick="loadData()">تحديث</button><button class="btn green" onclick="exportCSV()">تصدير CSV</button></div><div class="table-wrap"><table><thead><tr><th>القاعدة</th><th>المجموعة</th><th>الشرط</th><th>الإجراء</th><th>الأولوية</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="rows"></tbody></table></div>

</div>
<div id="toast" class="toast"></div>
<script>
const W = window.WesamFirebase;
const $ = (id)=>document.getElementById(id);
const statusBox = $('status');
function esc(v){return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function num(v){return Number(v || 0) || 0;}
function today(){return new Date().toISOString().slice(0,10);}
function money(v){return (num(v)).toFixed(2);}
function setStatus(msg, cls=''){ statusBox.className='notice '+cls; statusBox.textContent=msg; }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3200); }
function getForm(formId){return Object.fromEntries(new FormData($(formId)).entries());}
function download(name, text, type='application/json'){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function toCSV(rows){ if(!rows.length) return ''; const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))]; return '\ufeff'+[keys.join(','),...rows.map(r=>keys.map(k=>'"'+String(r[k]??'').replace(/"/g,'""')+'"').join(','))].join('\n'); }
async function guard(){ if(!W || !W.db){ setStatus('Firebase غير مهيأ. تأكد من رفع firebase-config.js ومن نشر قواعد Firestore.', 'err'); return false; } try{ await W.ensureCoreCollections({force:false}); setStatus('متصل مع Firebase: '+W.projectId, 'ok'); return true; }catch(e){ setStatus('الاتصال موجود لكن التهيئة أو الصلاحيات فشلت: '+e.message, 'err'); return true; } }
window.addEventListener('error', e => { setStatus('خطأ في الصفحة: '+(e.message||e.error), 'err'); });
</script>

<script>
let rules=[]; function resetForm(){ $('ruleForm').reset(); $('editId').value=''; }
async function loadData(){ if(!await guard())return; rules=await W.getCollection('automation_rules',{limit:800}); render();}
function render(){const q=($('q').value||'').toLowerCase(); const rows=rules.filter(r=>JSON.stringify(r).toLowerCase().includes(q)); $('stats').innerHTML=`<div class="card stat"><span>كل القواعد</span><b>${rules.length}</b></div><div class="card stat"><span>مفعلة</span><b>${rules.filter(r=>r.active===true||r.active==='true').length}</b></div><div class="card stat"><span>عالية/عاجلة</span><b>${rules.filter(r=>['high','urgent'].includes(r.priority)).length}</b></div><div class="card stat"><span>آخر تحديث</span><b style="font-size:18px">${today()}</b></div>`; $('rows').innerHTML=rows.map(r=>`<tr><td>${esc(r.title)}</td><td>${esc(r.collectionName)}</td><td>${esc(r.triggerStatus)}</td><td>${esc(r.action)}</td><td>${esc(r.priority)}</td><td><span class="badge ${r.active===true||r.active==='true'?'green':'orange'}">${r.active===true||r.active==='true'?'مفعلة':'موقوفة'}</span></td><td><button class="mini blue" onclick="editRow('${r.id}')">تعديل</button> <button class="mini green" onclick="runOne('${r.id}')">اختبار</button> <button class="mini red" onclick="delRow('${r.id}')">حذف</button></td></tr>`).join('')||'<tr><td colspan="7" class="muted">لا توجد قواعد</td></tr>';}
$('q').addEventListener('input',render); $('ruleForm').addEventListener('submit',async e=>{e.preventDefault(); if(!await guard())return; const d=getForm('ruleForm'); d.active=d.active==='true'; const id=d.id; delete d.id; if(id) await W.setDoc('automation_rules',id,d,true); else await W.addDoc('automation_rules',d); toast('تم حفظ القاعدة'); resetForm(); loadData();});
function editRow(id){const r=rules.find(x=>x.id===id); if(!r)return; Object.entries(r).forEach(([k,v])=>{const el=document.querySelector(`[name="${k}"]`); if(el)el.value=String(v);}); $('editId').value=id; scrollTo({top:0,behavior:'smooth'});} async function delRow(id){if(!confirm('حذف القاعدة؟'))return; await W.deleteDoc('automation_rules',id); loadData();}
async function runOne(id){const r=rules.find(x=>x.id===id); if(!r)return; await W.addDoc('notifications',{title:'اختبار قاعدة: '+r.title,message:r.message||'تم تشغيل اختبار القاعدة',priority:r.priority||'normal',status:'new',source:'automation_rules',ruleId:id}); await W.addAuditLog('test_automation_rule',{title:r.title}); toast('تم إنشاء إشعار اختبار');}
async function testRule(){const d=getForm('ruleForm'); await W.addDoc('notifications',{title:'اختبار قاعدة: '+(d.title||'بدون اسم'),message:d.message||'تم إنشاء إشعار اختبار',priority:d.priority||'normal',status:'new',source:'automation_rules_test'}); toast('تم إنشاء إشعار اختبار');}
function exportCSV(){download('automation_rules.csv',toCSV(rules),'text/csv')} loadData();
</script>

</body>
</html>
