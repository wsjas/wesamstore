<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>وصولات استلام وتسليم الأجهزة</title>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="firebase-config.js"></script><script src="admin-safe-loader.js"></script>
<style>:root{--bg:#f6f8fc;--card:#fff;--text:#142033;--muted:#64748b;--line:#e5e7eb;--orange:#f97316;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--dark:#111827;--shadow:0 18px 44px rgba(15,23,42,.08);--r:20px}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#fff7ed 0,#f6f8fc 40%,#eef6ff 100%);color:var(--text)}a{text-decoration:none;color:inherit}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{width:min(1240px,calc(100% - 28px));margin:auto;padding:18px 0 34px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0 16px;flex-wrap:wrap}.top h1{margin:0;font-size:25px}.muted{color:var(--muted)}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.btn{border:0;border-radius:13px;padding:10px 14px;background:#e5e7eb;color:#111827;font-weight:800;display:inline-flex;gap:7px;align-items:center;justify-content:center}.btn.primary{background:linear-gradient(135deg,var(--orange),#fb923c);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line)}.actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:#475569;font-weight:900}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;width:100%;min-width:0}.field textarea{min-height:86px;resize:vertical}.full{grid-column:1/-1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top}th{background:#f8fafc;font-size:13px;color:#475569}td{font-size:13px}.mini{padding:7px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:800}.mini.red{background:#fff1f2;color:#991b1b;border-color:#fecdd3}.mini.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.mini.green{background:#ecfdf5;color:#166534;border-color:#bbf7d0}.notice{border:1px dashed #fdba74;background:#fff7ed;color:#9a3412;border-radius:16px;padding:12px;margin-bottom:14px;line-height:1.7}.notice.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.notice.err{border-color:#fca5a5;background:#fef2f2;color:#991b1b}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.stat span{color:var(--muted);font-size:13px}.stat b{display:block;font-size:27px;margin-top:5px}.toast{position:fixed;left:16px;bottom:16px;z-index:99;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;display:none;max-width:min(520px,calc(100vw - 32px));line-height:1.6}.toast.show{display:block}.ltr{direction:ltr;text-align:left}.printbox{display:none}@media(max-width:900px){.two,.three,.four,.form{grid-template-columns:1fr}.wrap{width:min(100% - 18px,1240px)}.top h1{font-size:21px}}@media print{.top,.toolbar,.btn,.mini,.notice,.no-print{display:none!important}body{background:#fff}.card,.table-wrap{box-shadow:none;border:0}.printbox{display:block}}</style></head><body><div class="wrap"><div class="top"><div><h1>وصولات استلام وتسليم الأجهزة</h1><div class="muted">وسام للإلكترونيات — متصل بمشروع Firebase الصحيح</div></div><div class="actions"><a class="btn ghost" href="admin.html">لوحة التحكم</a><button class="btn blue" onclick="location.reload()">تحديث</button><a class="btn primary" href="index.html" target="_blank">فتح الموقع</a></div></div><div id="status" class="notice">جار تحميل Firebase...</div>
<div class="notice ok">تحفظ الوصولات في <b>device_handover</b> ويمكن طباعتها للعميل.</div><div class="grid two"><div class="card"><h3>إنشاء وصل</h3><form id="handoverForm" class="form"><div class="field"><label>نوع الوصل</label><select name="type"><option value="receive">استلام جهاز</option><option value="deliver">تسليم جهاز</option></select></div><div class="field"><label>رقم طلب الصيانة</label><input name="requestId"></div><div class="field"><label>اسم العميل</label><input name="customerName" required></div><div class="field"><label>الهاتف</label><input name="phone" required></div><div class="field"><label>نوع الجهاز</label><input name="deviceType"></div><div class="field"><label>الموديل / الحجم</label><input name="model"></div><div class="field full"><label>حالة الجهاز</label><textarea name="conditionText"></textarea></div><div class="field"><label>الملحقات</label><input name="accessories"></div><div class="field"><label>المبلغ المتوقع</label><input name="expectedAmount" type="number" step="0.01"></div><div class="field"><label>المدفوع</label><input name="paidAmount" type="number" step="0.01"></div><div class="field"><label>اسم المستلم</label><input name="staffName"></div><div class="field full"><label>ملاحظات</label><textarea name="notes">يتم فحص الجهاز وإبلاغ العميل بالتكلفة قبل الإصلاح عند الحاجة.</textarea></div><div class="full actions"><button class="btn primary">حفظ الوصل</button><button class="btn ghost" type="button" onclick="printCurrent()">طباعة النموذج</button></div></form></div><div class="card"><h3>ربط بطلب صيانة</h3><div id="repairList"></div></div></div><div class="card"><div class="toolbar"><button class="btn blue" onclick="loadAll()">تحديث</button></div><div id="list"></div></div><div id="printArea" class="printbox"></div>
</div><div id="toast" class="toast"></div><script>
function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(msg,ok=true){const t=$('toast');t.textContent=msg;t.style.background=ok?'#111827':'#991b1b';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3800)}
function num(v){return Number(v||0)}
function jod(v){return num(v).toFixed(2)+' د.أ'}
function dtext(v){try{const d=v&&v.toDate?v.toDate():(v?new Date(v):null);return d&&!isNaN(d)?d.toLocaleString('ar-JO'):'—'}catch(e){return '—'}}
function phoneClean(p){return String(p||'').replace(/\D/g,'').replace(/^0/,'962')}
function formData(form){const data=Object.fromEntries(new FormData(form).entries());Object.keys(data).forEach(k=>{if(data[k]==='true')data[k]=true;else if(data[k]==='false')data[k]=false;else if(['amount','points','total','sortOrder','stock','discount','paidAmount','expectedAmount'].includes(k))data[k]=Number(data[k]||0)});return data}
function table(headers, rows, empty='لا توجد بيانات'){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" style="text-align:center;color:#64748b;padding:22px">${empty}</td></tr>`}</tbody></table></div>`}
function setStatus(text, ok=true){$('status').className='notice '+(ok?'ok':'err');$('status').textContent=text}
window.addEventListener('error',e=>setStatus('خطأ في الصفحة: '+(e.message||e.error),false));
</script><script>
let receipts=[],repairs=[]; const WF=()=>window.WesamFirebase;
async function loadAll(){try{[receipts,repairs]=await Promise.all([WF().getCollection('device_handover',{limit:1000}),WF().getCollection('service_requests',{limit:600})]); setStatus('تم تحميل الوصولات'); render()}catch(e){setStatus(e.message,false)}}
function render(){$('repairList').innerHTML=table(['رقم','العميل','الهاتف',''],repairs.slice(0,8).map(r=>`<tr><td>${esc(r.requestId||r.id)}</td><td>${esc(r.customerName||r.name||'')}</td><td>${esc(r.phone||'')}</td><td><button class="mini blue" onclick="fillRepair('${r.id}')">استخدام</button></td></tr>`),'لا توجد طلبات'); $('list').innerHTML=table(['التاريخ','النوع','العميل','الجهاز','طلب الصيانة','المبلغ','إجراءات'],receipts.map(x=>`<tr><td>${dtext(x.createdAt)}</td><td>${x.type==='deliver'?'تسليم':'استلام'}</td><td><b>${esc(x.customerName)}</b><br>${esc(x.phone)}</td><td>${esc(x.deviceType||'')} ${esc(x.model||'')}</td><td>${esc(x.requestId||'')}</td><td>${jod(x.expectedAmount)} / ${jod(x.paidAmount)}</td><td><button class="mini blue" onclick="printReceipt('${x.id}')">طباعة</button> <button class="mini red" onclick="delReceipt('${x.id}')">حذف</button></td></tr>`))}
function fillRepair(id){const r=repairs.find(x=>x.id===id); if(!r)return; const f=$('handoverForm'); f.requestId.value=r.requestId||r.id; f.customerName.value=r.customerName||r.name||''; f.phone.value=r.phone||r.customerPhone||''; f.deviceType.value=r.deviceType||''; f.model.value=r.deviceSize||r.model||''; f.conditionText.value=r.faultDesc||r.description||''; scrollTo({top:0,behavior:'smooth'})}
$('handoverForm').onsubmit=async e=>{e.preventDefault();try{const d=formData(e.target); d.receiptId='DH-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+Math.floor(1000+Math.random()*9000); await WF().addDoc('device_handover',d); e.target.reset(); await loadAll(); toast('تم حفظ الوصل')}catch(err){toast(err.message,false)}}
function receiptHTML(x){return `<div style="font-family:Tahoma;direction:rtl;padding:22px"><h1>وسام للإلكترونيات</h1><h2>${x.type==='deliver'?'وصل تسليم جهاز':'وصل استلام جهاز'}</h2><p>رقم الوصل: <b>${x.receiptId||x.id||'غير محفوظ'}</b></p><p>التاريخ: ${dtext(x.createdAt)||new Date().toLocaleString('ar-JO')}</p><hr><p>العميل: <b>${esc(x.customerName)}</b> — الهاتف: ${esc(x.phone)}</p><p>الجهاز: ${esc(x.deviceType||'')} ${esc(x.model||'')}</p><p>رقم طلب الصيانة: ${esc(x.requestId||'')}</p><p>الملحقات: ${esc(x.accessories||'')}</p><p>حالة الجهاز: ${esc(x.conditionText||'')}</p><p>المبلغ المتوقع: ${jod(x.expectedAmount)} — المدفوع: ${jod(x.paidAmount)}</p><p>ملاحظات: ${esc(x.notes||'')}</p><br><p>توقيع العميل: ____________ &nbsp;&nbsp; توقيع المركز: ____________</p></div>`}
function printCurrent(){const d=formData($('handoverForm')); $('printArea').innerHTML=receiptHTML(d); window.print()}
function printReceipt(id){const x=receipts.find(r=>r.id===id); if(!x)return; $('printArea').innerHTML=receiptHTML(x); window.print()}
async function delReceipt(id){if(!confirm('حذف الوصل؟'))return; await WF().deleteDoc('device_handover',id); await loadAll()}
setTimeout(loadAll,700);</script></body></html>
